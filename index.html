<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Welcome Weddings — Gestão</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#f7f6f3;color:#1a1a1a;font-size:14px;overflow:hidden;height:100vh}
button{font-family:'DM Sans',sans-serif;cursor:pointer}
input,select,textarea{font-family:'DM Sans',sans-serif}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:230px;background:#fff;border-right:.5px solid #e8e8e4;display:flex;flex-direction:column;flex-shrink:0}
.logo{padding:22px 20px 18px;border-bottom:.5px solid #f0f0ec}
.logo-main{font-family:'Playfair Display',serif;font-size:16px;font-weight:700}
.logo-sub{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:#8b7355;line-height:1}
.logo-tag{font-size:10px;color:#bbb;margin-top:6px;letter-spacing:.08em;text-transform:uppercase}
.nav{padding:12px 10px;flex:1;overflow-y:auto}
.nav-label{font-size:10px;color:#ccc;text-transform:uppercase;letter-spacing:.08em;padding:0 8px;margin:14px 0 4px}
.nav-btn{display:flex;align-items:center;gap:9px;width:100%;padding:8px 10px;border-radius:10px;border:none;background:transparent;color:#888;font-size:13px;text-align:left;transition:all .15s;margin-bottom:2px}
.nav-btn:hover{background:#f7f6f3;color:#1a1a1a}
.nav-btn.active{background:#f7f6f3;color:#1a1a1a;font-weight:600}
.nav-count{margin-left:auto;font-size:11px;background:#f5f5f3;border-radius:10px;padding:1px 8px;color:#aaa}
.nav-btn.active .nav-count{background:#e8e8e4}
.user-area{padding:14px 16px;border-top:.5px solid #f0f0ec}
.user-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#d4a853,#8b5e3c);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:#fff;border-bottom:.5px solid #e8e8e4;padding:14px 28px;display:flex;align-items:center;gap:16px}
.topbar h1{font-size:16px;font-weight:700;font-family:'Playfair Display',serif;flex:1}
.search-wrap{position:relative}
.search-wrap i{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:14px;color:#aaa;pointer-events:none}
.search-input{padding-left:34px;padding-right:12px;height:34px;border-radius:8px;border:.5px solid #e8e8e4;font-size:13px;outline:none;width:200px;background:#fafaf8}
.filterbar{background:#fff;border-bottom:.5px solid #e8e8e4;padding:10px 28px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.filter-btn{font-size:12px;padding:5px 14px;border-radius:20px;border:.5px solid #e8e8e4;background:transparent;color:#666;transition:all .15s}
.filter-btn:hover{border-color:#888}
.filter-btn.active-dark{border:1.5px solid #1a1a1a;background:#1a1a1a;color:#fff;font-weight:600}
.filter-btn.active-gold{border:1.5px solid #8b7355;background:#8b7355;color:#fff;font-weight:600}
.divider-v{width:1px;height:20px;background:#eee;margin:0 6px;flex-shrink:0}
.content{flex:1;overflow-y:auto;padding:24px 28px}
.stat-grid{display:grid;gap:14px;margin-bottom:24px}
.g4{grid-template-columns:repeat(4,1fr)}.g5{grid-template-columns:repeat(5,1fr)}
.stat-card{background:#fff;border-radius:14px;border:.5px solid #e8e8e4;padding:16px 18px}
.stat-label{font-size:11px;color:#aaa;margin-bottom:6px}
.stat-val{font-size:28px;font-weight:700;font-family:'Playfair Display',serif;line-height:1}
.stat-sub{font-size:11px;color:#bbb;margin-top:6px}
.table-card{background:#fff;border-radius:14px;border:.5px solid #e8e8e4;overflow:hidden;margin-bottom:20px}
.table-header{padding:14px 18px;border-bottom:.5px solid #eee;font-weight:600;font-size:14px;display:flex;align-items:center;gap:8px}
.tbl{width:100%;border-collapse:collapse}
.tbl th{font-size:11px;color:#aaa;font-weight:600;text-align:left;padding:10px 16px;border-bottom:.5px solid #eee;background:#fafaf8;white-space:nowrap}
.tbl td{padding:11px 16px;border-bottom:.5px solid #f5f5f3;vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr:hover td{background:#fafaf8}
.tbl tbody tr{cursor:pointer;transition:background .15s}
.tbl-scroll{overflow-x:auto}
.badge{display:inline-block;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;white-space:nowrap}
.b-green{background:#e6f4ea;color:#1e7e34}.b-amber{background:#fff3cd;color:#856404}
.b-red{background:#fde8e8;color:#a81a1a}.b-blue{background:#e8f0fd;color:#1a4fa8}
.b-purple{background:#f5e8fd;color:#6f1aa8}.b-teal{background:#e8f4ea;color:#1a6f4a}
.b-gray{background:#f0f0ec;color:#666}.b-sm{font-size:10px;padding:2px 8px}
.b-hotel{background:#fff0e0;color:#8b5000}
.planner-chip{display:flex;align-items:center;gap:6px}
.planner-dot{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}
.prog-wrap{display:flex;align-items:center;gap:6px}
.prog-bar{height:4px;background:#f0f0f0;border-radius:4px;overflow:hidden;width:70px}
.prog-fill{height:100%;border-radius:4px}
.date-box{width:44px;height:44px;border-radius:10px;background:#f7f6f3;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0}
.date-day{font-size:16px;font-weight:700;line-height:1;font-family:'Playfair Display',serif}
.date-mon{font-size:9px;color:#aaa;text-transform:uppercase}
.expand-row{cursor:pointer;transition:background .15s}
.expand-row:hover{background:#fafaf8}
.expand-detail{background:#fafaf8;border-top:.5px solid #f0f0ec;padding:16px 20px}
.detail-label{font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;font-weight:600}
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px}
.upcoming-item{display:flex;align-items:center;gap:12px;padding:10px 18px;border-bottom:.5px solid #f5f5f3}
.upcoming-item:last-child{border-bottom:none}
.planner-row{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.planner-bar-wrap{flex:1;height:6px;background:#f0f0f0;border-radius:4px;overflow:hidden}
.destino-chips{padding:18px;display:flex;gap:12px;flex-wrap:wrap}
.destino-chip{background:#fafaf8;border-radius:12px;border:.5px solid #eee;padding:12px 18px;text-align:center}

/* ALERTAS DE PRAZO */
.prazo-ok{background:#f0faf0;border-left:3px solid #1e7e34}
.prazo-medio{background:#fffbf0;border-left:3px solid #e6a817}
.prazo-critico{background:#fff5f0;border-left:3px solid #d9480f}
.prazo-gritando{background:#fff0f0;border-left:3px solid #a81a1a;animation:pulso 2s infinite}
@keyframes pulso{0%,100%{border-left-color:#a81a1a}50%{border-left-color:#ff4444}}
.prazo-badge-ok{background:#e6f4ea;color:#1e7e34;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px}
.prazo-badge-medio{background:#fff3cd;color:#856404;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px}
.prazo-badge-critico{background:#ffe8d6;color:#d9480f;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px}
.prazo-badge-gritando{background:#fde8e8;color:#a81a1a;font-size:11px;font-weight:800;padding:3px 10px;border-radius:20px;letter-spacing:.03em;animation:pulso-txt 1.5s infinite}
@keyframes pulso-txt{0%,100%{opacity:1}50%{opacity:.6}}

/* CHECKBOX FORNECEDORES */
.forn-check-item{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:8px;transition:background .15s}
.forn-check-item:hover{background:#f0f0ec}
.forn-checkbox{width:16px;height:16px;border-radius:4px;border:1.5px solid #ccc;background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:all .15s}
.forn-checkbox.checked{background:#1a6f4a;border-color:#1a6f4a}
.forn-label{font-size:13px;color:#1a1a1a;cursor:pointer}
.forn-label.checked{color:#aaa;text-decoration:line-through}

/* REUNIÕES */
.reuniao-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:.5px solid #f0f0ec}
.reuniao-item:last-child{border-bottom:none}
.reuniao-dot{width:8px;height:8px;border-radius:50%;background:#8b7355;flex-shrink:0;margin-top:5px}
.add-reuniao-row{display:flex;gap:8px;margin-top:10px}
.add-reuniao-row input{height:34px;border-radius:8px;border:.5px solid #e8e8e4;padding:0 10px;font-size:12px;outline:none;background:#fafaf8}
.add-reuniao-row input:focus{border-color:#8b7355}
.btn-add-small{height:34px;background:#1a1a1a;color:#fff;border:none;border-radius:8px;padding:0 14px;font-size:12px;font-weight:600;white-space:nowrap}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:#fff;border-radius:20px;width:100%;max-width:720px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-header{padding:20px 24px;border-bottom:.5px solid #eee;display:flex;align-items:center;gap:12px}
.modal-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;flex:1}
.modal-close{width:32px;height:32px;border-radius:50%;border:none;background:#f5f5f3;display:flex;align-items:center;justify-content:center;font-size:16px;color:#666;cursor:pointer}
.modal-close:hover{background:#eee}
.modal-tabs{display:flex;border-bottom:.5px solid #eee;padding:0 24px}
.modal-tab{padding:10px 16px;font-size:13px;font-weight:500;color:#aaa;border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.modal-tab.active{color:#1a1a1a;border-bottom-color:#8b7355;font-weight:600}
.modal-body{padding:24px;overflow-y:auto;flex:1}
.modal-footer{padding:16px 24px;border-top:.5px solid #eee;display:flex;gap:10px;justify-content:flex-end}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-group.full{grid-column:1/-1}
.form-label{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.06em}
.form-input{height:38px;border-radius:8px;border:.5px solid #e8e8e4;padding:0 12px;font-size:13px;outline:none;background:#fafaf8;transition:border .15s}
.form-input:focus{border-color:#8b7355;background:#fff}
.form-select{height:38px;border-radius:8px;border:.5px solid #e8e8e4;padding:0 12px;font-size:13px;outline:none;background:#fafaf8}
.form-select:focus{border-color:#8b7355}
.form-textarea{border-radius:8px;border:.5px solid #e8e8e4;padding:10px 12px;font-size:13px;outline:none;background:#fafaf8;resize:vertical;min-height:70px;transition:border .15s}
.form-textarea:focus{border-color:#8b7355;background:#fff}
.form-section{font-size:12px;font-weight:600;color:#8b7355;margin:18px 0 10px;padding-bottom:6px;border-bottom:.5px solid #f0f0ec;grid-column:1/-1}
.btn-save{background:#1a1a1a;color:#fff;border:none;border-radius:10px;padding:10px 24px;font-size:13px;font-weight:600;cursor:pointer}
.btn-save:hover{background:#333}
.btn-cancel{background:transparent;color:#888;border:.5px solid #e8e8e4;border-radius:10px;padding:10px 20px;font-size:13px;cursor:pointer}
.btn-cancel:hover{background:#f5f5f3}
.btn-delete{background:#fde8e8;color:#a81a1a;border:none;border-radius:10px;padding:10px 20px;font-size:13px;font-weight:600;cursor:pointer;margin-right:auto}
.btn-delete:hover{background:#f5d0d0}
.btn-icon{background:#f5f5f3;border:none;border-radius:8px;padding:5px 10px;font-size:11px;color:#888;cursor:pointer;flex-shrink:0}
.btn-icon:hover{background:#eee}
.hidden{display:none}
.flex{display:flex}.flex-center{display:flex;align-items:center}
.gap6{gap:6px}.gap8{gap:8px}.gap10{gap:10px}.gap12{gap:12px}
.flex1{flex:1}.fw6{font-weight:600}.fw7{font-weight:700}.fw8{font-weight:800}
.f10{font-size:10px}.f11{font-size:11px}.f12{font-size:12px}.f13{font-size:13px}
.muted{color:#888}.lighter{color:#aaa}
.ellipsis{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mb4{margin-bottom:4px}.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mb20{margin-bottom:20px}.mb24{margin-bottom:24px}
.urgente-row{display:flex;gap:14px;padding:14px 18px;border-bottom:.5px solid #f5f5f3;align-items:flex-start}
.urgente-row:last-child{border-bottom:none}
</style>
</head>
<body>
<div class="app">
<div class="sidebar">
  <div class="logo">
    <div class="logo-main">Welcome</div>
    <div class="logo-sub">Weddings</div>
    <div class="logo-tag">Gestão de Casamentos</div>
  </div>
  <nav class="nav">
    <div class="nav-label">Principal</div>
    <button class="nav-btn active" onclick="setView('dashboard',this)"><i class="ti ti-layout-dashboard"></i><span class="flex1">Visão geral</span></button>
    <button class="nav-btn" onclick="setView('casamentos-2026',this)"><i class="ti ti-calendar-event"></i><span class="flex1">Casamentos 2026</span><span class="nav-count" id="cnt-2026">—</span></button>
    <button class="nav-btn" onclick="setView('casamentos-2027',this)"><i class="ti ti-calendar-event"></i><span class="flex1">Casamentos 2027</span><span class="nav-count" id="cnt-2027">—</span></button>
    <button class="nav-btn" onclick="setView('planejamento',this)"><i class="ti ti-pencil"></i><span class="flex1">Planejamento</span><span class="nav-count" id="cnt-plan">—</span></button>
    <button class="nav-btn" onclick="setView('producao',this)"><i class="ti ti-settings-2"></i><span class="flex1">Produção</span><span class="nav-count" id="cnt-prod">—</span></button>
  </nav>
  <div class="user-area">
    <div class="flex-center gap10">
      <div class="user-avatar">AT</div>
      <div><div class="f13 fw6">Ana Tereza</div><div class="f11 lighter">Coordenadora</div></div>
    </div>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <h1 id="page-title">Visão geral</h1>
    <div class="search-wrap hidden" id="search-area">
      <i class="ti ti-search"></i>
      <input class="search-input" id="search-input" placeholder="Buscar casal..." oninput="render()"/>
    </div>
  </div>
  <div class="filterbar hidden" id="filterbar">
    <button class="filter-btn active-dark" onclick="setStatusFilter(this,'todos')">Todos</button>
    <button class="filter-btn" onclick="setStatusFilter(this,'em-andamento')">Em andamento</button>
    <button class="filter-btn" onclick="setStatusFilter(this,'finalizado')">Finalizados</button>
    <button class="filter-btn" onclick="setStatusFilter(this,'urgente')">Urgentes</button>
    <button class="filter-btn" onclick="setStatusFilter(this,'escolher-hotel')">Escolher hotel</button>
    <div class="divider-v"></div>
    <button class="filter-btn active-gold" onclick="setDestinoFilter(this,'todos')">Todos</button>
    <button class="filter-btn" onclick="setDestinoFilter(this,'Nordeste')">🌊 Nordeste</button>
    <button class="filter-btn" onclick="setDestinoFilter(this,'Caribe')">🌴 Caribe</button>
    <button class="filter-btn" onclick="setDestinoFilter(this,'Itália')">🇮🇹 Itália</button>
    <button class="filter-btn" onclick="setDestinoFilter(this,'Grécia')">🇬🇷 Grécia</button>
    <button class="filter-btn" onclick="setDestinoFilter(this,'México')">🇲🇽 México</button>
    <button class="filter-btn" onclick="setDestinoFilter(this,'Brasil')">🇧🇷 Brasil</button>
    <button class="filter-btn" onclick="setDestinoFilter(this,'Argentina')">🇦🇷 Argentina</button>
  </div>
  <div class="content" id="content"></div>
</div>
</div>

<!-- MODAL -->
<div class="modal-overlay hidden" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Editar</div>
      <button class="modal-close" onclick="closeModal()"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-tabs" id="modal-tabs"></div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer">
      <button class="btn-delete" onclick="deleteItem()"><i class="ti ti-trash"></i> Excluir</button>
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="saveItem()"><i class="ti ti-check"></i> Salvar</button>
    </div>
  </div>
</div>

<script>
// ─── DATA ─────────────────────────────────────────────────────────────────────
const PLANNERS={Julia:{color:"#E8F4FD",text:"#1a6fa8",initials:"JU"},Raphaela:{color:"#FDE8F4",text:"#a81a6f",initials:"RA"},Corina:{color:"#E8FDE8",text:"#1a6f1a",initials:"CO"},Isabela:{color:"#FDF5E8",text:"#a86f1a",initials:"IS"},Sabrina:{color:"#F0E8FD",text:"#6f1aa8",initials:"SA"},Giulia:{color:"#E8FDF5",text:"#1aa86f",initials:"GI"},Diana:{color:"#FDE8E8",text:"#a81a1a",initials:"DI"}};
const MESES=["","jan","fev","mar","abr","mai","jun","jul","ago","set","out","nov","dez"];
const FLAGS={Itália:"🇮🇹",Nordeste:"🌊",Caribe:"🌴",México:"🇲🇽",Grécia:"🇬🇷",Argentina:"🇦🇷",Portugal:"🇵🇹",Brasil:"🇧🇷","Punta Cana":"🌴",Mendoza:"🇦🇷",Aruba:"🏝️",Espanha:"🇪🇸",Bahia:"🌊"};
function destFlag(d){if(!d)return"📍";for(const[k,v]of Object.entries(FLAGS))if(d.includes(k))return v;return"📍";}
function parseDate(s){if(!s||!s.includes("/"))return null;const p=s.split("/");return new Date(`${p[2]}-${p[1].padStart(2,"0")}-${p[0].padStart(2,"0")}`);}
function diasRestantes(s){const d=parseDate(s);if(!d)return null;return Math.ceil((d-new Date())/86400000);}

// Fornecedores com checked state: {nome, checked}
function normForn(arr){if(!arr)return[];return arr.map(f=>typeof f==="string"?{nome:f,checked:false}:f);}
// Reunioes: [{data, assunto}]
function normReunioes(arr){return arr||[];}

let C26=[
  {id:1,casal:"Marina e Andrey",local:"Dreams Macao",destino:"Caribe",data:"12/04/2026",produtora:"Julia",assessor:"n/a",status:"finalizado",convidados:0,fornecedores:[{nome:"foto e vídeo",checked:true},{nome:"make",checked:true},{nome:"locais",checked:true},{nome:"decoração",checked:true}],andamento:"FINALIZADO",eventos:["10/04: Welcome drinks","12/04: Pool Party"],reunioes:[]},
  {id:2,casal:"Tayane e Erton",local:"Unico 2087",destino:"Argentina",data:"28/04/2026",produtora:"Julia",assessor:"Elopement",status:"finalizado",convidados:0,fornecedores:[{nome:"make",checked:true},{nome:"foto",checked:true},{nome:"local",checked:true}],andamento:"FINALIZADO",eventos:[],reunioes:[]},

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function plannerDot(name,size=24){const p=PLANNERS[name]||{color:"#f0f0f0",text:"#666",initials:(name||"?").slice(0,2).toUpperCase()};return`<div class="planner-chip"><div class="planner-dot" style="width:${size}px;height:${size}px;background:${p.color};color:${p.text};font-size:${size<=24?9:11}px">${p.initials}</div><span class="f12 muted">${name||"—"}</span></div>`;}

function statusBadge(s){
  const m={finalizado:{l:"Finalizado",c:"b-green"},"em-andamento":{l:"Em andamento",c:"b-amber"},urgente:{l:"Urgente",c:"b-red"},planejamento:{l:"Planejamento",c:"b-blue"},distrato:{l:"Distrato",c:"b-purple"},"escolher-hotel":{l:"🏨 Escolher hotel",c:"b-hotel"}};
  const x=m[s]||m["em-andamento"];
  return`<span class="badge ${x.c}">${x.l}</span>`;
}

function progBar(s){const pct={finalizado:100,"em-andamento":55,urgente:40,planejamento:20,distrato:15,"escolher-hotel":10}[s]||50;const col={finalizado:"#1e7e34","em-andamento":"#856404",urgente:"#a81a1a",planejamento:"#1a4fa8",distrato:"#6f1aa8","escolher-hotel":"#8b5000"}[s]||"#856404";return`<div class="prog-wrap"><div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:${col}"></div></div><span class="f11 lighter">${pct}%</span></div>`;}

function dateBox(data,urg=false){if(!data||!data.includes("/")){return`<div class="date-box" style="background:${urg?"#fde8e8":"#f7f6f3"}"><span class="f11 lighter">${data||"—"}</span></div>`;}const p=data.split("/");return`<div class="date-box" style="background:${urg?"#fde8e8":"#f7f6f3"}"><div class="date-day" style="color:${urg?"#a81a1a":"inherit"}">${p[0]}</div><div class="date-mon">${MESES[parseInt(p[1])]||p[1]}</div></div>`;}

// ── PRAZO ALERT (só produção) ─────────────────────────────────────────────────
function getPrazoCls(d){
  if(d===null) return {cls:'',badge:'',txt:''};
  if(d<0)  return {cls:'prazo-gritando',badge:'prazo-badge-gritando',txt:'🔴 REALIZADO — VERIFICAR'};
  if(d<=30) return {cls:'prazo-gritando',badge:'prazo-badge-gritando',txt:`🔴 ${d}d — URGENTÍSSIMO!`};
  if(d<=45) return {cls:'prazo-critico', badge:'prazo-badge-critico', txt:`🟠 ${d}d — Atenção!`};
  if(d<=90) return {cls:'prazo-medio',   badge:'prazo-badge-medio',   txt:`🟡 ${d}d`};
  return       {cls:'prazo-ok',      badge:'prazo-badge-ok',      txt:`✅ ${d}d`};
}

function fmtDias(s,showBadge=true){const d=diasRestantes(s);if(d===null)return'';const p=getPrazoCls(d);return showBadge?`<span class="${p.badge}">${p.txt}</span>`:`${d}d`;}

function getSearch(){return document.getElementById("search-input")?.value.toLowerCase()||"";}
function applyFilter(list){const s=getSearch();return list.filter(c=>{if(statusFilter!=="todos"&&c.status!==statusFilter)return false;if(destinoFilter!=="todos"&&!(c.destino||"").includes(destinoFilter))return false;if(s&&!(c.casal||"").toLowerCase().includes(s)&&!(c.local||c.destino||"").toLowerCase().includes(s))return false;return true;});}
const hasAssessor=c=>c.assessor&&!["n/a","a definir","A DEFINIR","N/A","N/D","—",""].includes(c.assessor);

function fornPills(list,max=4){
  if(!list||list.length===0)return`<span class="badge b-sm b-red">sem fornecedores</span>`;
  const total=list.length, checked=list.filter(f=>f.checked).length;
  return `<span class="badge b-sm ${checked===total?'b-green':'b-gray'}">${checked}/${total} fornecedores</span>`;
}

// ─── MODAL ────────────────────────────────────────────────────────────────────
function openModal(item,dataset){
  editingItem=JSON.parse(JSON.stringify(item));
  editingDataset=dataset;
  currentTab='info';
  document.getElementById("modal-title").textContent=item.casal||"Editar";
  const isCasamento=dataset==='c26'||dataset==='c27';
  const tabs=isCasamento
    ?`<button class="modal-tab active" onclick="switchTab('info',this)">📋 Informações</button><button class="modal-tab" onclick="switchTab('fornecedores',this)">✅ Fornecedores</button><button class="modal-tab" onclick="switchTab('reunioes',this)">📅 Reuniões</button>`
    :`<button class="modal-tab active" onclick="switchTab('info',this)">📋 Informações</button><button class="modal-tab" onclick="switchTab('reunioes',this)">📅 Reuniões</button>`;
  document.getElementById("modal-tabs").innerHTML=tabs;
  renderModalBody();
  document.getElementById("modal-overlay").classList.remove("hidden");
}

function switchTab(tab,btn){
  currentTab=tab;
  document.querySelectorAll(".modal-tab").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  renderModalBody();
}

function renderModalBody(){
  document.getElementById("modal-body").innerHTML=buildTabContent();
}


function fornItem(f,i){
  var chk = f.checked ? '<i class="ti ti-check" style="font-size:10px;color:#fff"></i>' : '';
  var chkCls = f.checked ? 'checked' : '';
  return '<div class="forn-check-item" onclick="toggleFornCheck('+i+')">'
    + '<div class="forn-checkbox '+chkCls+'">'+chk+'</div>'
    + '<span class="forn-label '+chkCls+'">'+f.nome+'</span>'
    + '</div>';
}
function buildTabContent(){
  const item=editingItem, ds=editingDataset;
  const isCas=ds==='c26'||ds==='c27';
  const isPlan=ds==='plan', isDist=ds==='distrato';
  const pOpts=Object.keys(PLANNERS);

function toggleFornCheck(idx){
  editingItem.fornecedores[idx].checked=!editingItem.fornecedores[idx].checked;
  renderModalBody();
}

function addFornecedor(){
  const val=document.getElementById("new-forn-input")?.value.trim();
  if(!val)return;
  editingItem.fornecedores.push({nome:val,checked:false});
  renderModalBody();
}

function addReuniao(){
  const data=document.getElementById("new-reuniao-data")?.value;
  const assunto=document.getElementById("new-reuniao-assunto")?.value.trim();
  if(!assunto)return;
  const d=data?data.split("-").reverse().join("/"):new Date().toLocaleDateString("pt-BR");
  editingItem.reunioes.push({data:d,assunto});
  renderModalBody();
}

function deleteReuniao(idx){
  editingItem.reunioes.splice(idx,1);
  renderModalBody();
}

function closeModal(){document.getElementById("modal-overlay").classList.add("hidden");editingItem=null;editingDataset=null;}
function handleOverlayClick(e){if(e.target===document.getElementById("modal-overlay"))closeModal();}

function saveItem(){
  const ds=editingDataset, id=editingItem.id;
  const g=id=>{const el=document.getElementById(id);return el?el.value.trim():"";};
  if(ds==='distrato'){const idx=DISTRATOS.findIndex(x=>x.id===id);if(idx!==-1)DISTRATOS[idx]={...DISTRATOS[idx],casal:g("f-casal"),destino:g("f-destino"),convidados:parseInt(g("f-convidados"))||0,responsavel:g("f-responsavel"),andamento:g("f-andamento"),reunioes:editingItem.reunioes};}
  else if(ds==='plan'){const idx=PLAN.findIndex(x=>x.id===id);if(idx!==-1)PLAN[idx]={...PLAN[idx],casal:g("f-casal"),destino:g("f-destino"),hotel:g("f-hotel"),dataInteresse:g("f-dataInteresse"),convidados:parseInt(g("f-convidados"))||0,responsavel:g("f-responsavel"),status:g("f-status"),andamento:g("f-andamento"),reunioes:editingItem.reunioes};}
  else{const arr=ds==='c26'?C26:C27;const idx=arr.findIndex(x=>x.id===id);if(idx!==-1)arr[idx]={...arr[idx],casal:g("f-casal"),local:g("f-local"),destino:g("f-destino"),data:g("f-data"),convidados:parseInt(g("f-convidados"))||0,produtora:g("f-produtora"),assessor:g("f-assessor"),status:g("f-status"),andamento:g("f-andamento"),eventos:g("f-eventos").split("\n").map(x=>x.trim()).filter(Boolean),fornecedores:editingItem.fornecedores,reunioes:editingItem.reunioes};}
  updateCounts();closeModal();render();
}

function deleteItem(){
  if(!confirm(`Excluir "${editingItem.casal}"?`))return;
  const ds=editingDataset,id=editingItem.id;
  if(ds==='distrato')DISTRATOS=DISTRATOS.filter(x=>x.id!==id);
  else if(ds==='plan')PLAN=PLAN.filter(x=>x.id!==id);
  else if(ds==='c26')C26=C26.filter(x=>x.id!==id);
  else C27=C27.filter(x=>x.id!==id);
  updateCounts();closeModal();render();
}

    html+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px"><span class="f13 fw7 muted">Em andamento</span><span class="badge b-sm b-amber">${emAndamento.length}</span></div>
    <div class="table-card" style="margin-bottom:0">${emAndamento.map((c,idx)=>{const cds=c.id>=100?'c27':'c26';const d=diasRestantes(c.data);const prazo=getPrazoCls(d);return`<div class="${prazo.cls}" style="display:flex;gap:14px;padding:13px 18px;border-bottom:${idx<emAndamento.length-1?".5px solid #f5f5f3":"none"};align-items:center;cursor:pointer" onclick="openModal(${JSON.stringify(c).replace(/"/g,'&quot;')},'${cds}')">
      ${dateBox(c.data)}<div style="flex:1;min-width:0"><div class="f13 fw6">${c.casal} ${prazo.txt?`<span class="${prazo.badge} b-sm">${prazo.txt}</span>`:""}</div><div class="f11 lighter">${destFlag(c.destino)} ${c.destino} · ${c.local}</div></div>
      <div class="f11 muted ellipsis" style="max-width:180px">${c.andamento||""}</div>${plannerDot(c.produtora)}${statusBadge(c.status)}
    </div>`;}).join("")}</div>`;
  }
  return html;
}

// ─── CONTROLLER ───────────────────────────────────────────────────────────────
const TITLES={dashboard:"Visão geral","casamentos-2026":"Casamentos 2026","casamentos-2027":"Casamentos 2027",planejamento:"Planejamento & Distratos",producao:"Produção"};
function render(){
  const el=document.getElementById("content");
  if(currentView==="dashboard")el.innerHTML=renderDashboard();
  else if(currentView==="casamentos-2026")el.innerHTML=renderCasamentos(C26,2026,'c26');
  else if(currentView==="casamentos-2027")el.innerHTML=renderCasamentos(C27,2027,'c27');
  else if(currentView==="planejamento")el.innerHTML=renderPlanejamento();
  else if(currentView==="producao")el.innerHTML=renderProducao();
}
function setView(v,btn){
  currentView=v;statusFilter='todos';destinoFilter='todos';expandedId=null;
  document.getElementById("page-title").textContent=TITLES[v];
  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  const hasFilt=v!=="dashboard";
  document.getElementById("filterbar").classList.toggle("hidden",!hasFilt);
  document.getElementById("search-area").classList.toggle("hidden",!hasFilt);
  if(document.getElementById("search-input"))document.getElementById("search-input").value="";
  document.querySelectorAll("[onclick*='setStatusFilter']").forEach(b=>{b.classList.remove("active-dark");if(b.textContent==="Todos")b.classList.add("active-dark");});
  document.querySelectorAll("[onclick*='setDestinoFilter']").forEach(b=>{b.classList.remove("active-gold");if(b.textContent==="Todos")b.classList.add("active-gold");});
  render();
}
function setStatusFilter(btn,val){statusFilter=val;document.querySelectorAll("[onclick*='setStatusFilter']").forEach(b=>b.classList.remove("active-dark"));btn.classList.add("active-dark");render();}
function setDestinoFilter(btn,val){destinoFilter=val;document.querySelectorAll("[onclick*='setDestinoFilter']").forEach(b=>b.classList.remove("active-gold"));btn.classList.add("active-gold");render();}
function setGroupBy(g){groupBy=g;render();}
function handleProdRow(event,id){expandedId=(expandedId===id?null:id);render();}
function updateCounts(){
  document.getElementById("cnt-2026").textContent=C26.length;
  document.getElementById("cnt-2027").textContent=C27.length;
  document.getElementById("cnt-plan").textContent=PLAN.length;
  document.getElementById("cnt-prod").textContent=[...C26,...C27].filter(c=>c.status!=="finalizado").length;
}
updateCounts();render();
</script>
