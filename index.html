<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome Weddings — Embarque</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
:root {
  --bg:#F7F6F4; --surface:#FFFFFF; --border:#E8E5E0; --border2:#C8C2BA;
  --text:#1C1916; --text-mid:#6B6560; --text-dim:#A89F96;
  --accent:#7C6E5A; --accent-l:#F0EDE8;
  --green:#4A7C5F; --green-l:#EAF3EE;
  --blue:#3D6494; --blue-l:#EBF1F8;
  --rose:#8A4A5F; --rose-l:#F5ECF0;
  --amber:#8A6A30; --amber-l:#F5EEE0;
  --future:#6A4A8A; --future-l:#EEE8F5;
  --done:#2A6060; --done-l:#E0F2F2;
  --r:6px; --rl:10px;
}
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; font-size:13px; }

/* HEADER */
.app-header {
  background:var(--surface); border-bottom:1px solid var(--border);
  padding:0 28px; height:52px; display:flex; align-items:center;
  justify-content:space-between; position:sticky; top:0; z-index:50;
}
.app-logo { display:flex; align-items:baseline; gap:6px; }
.app-logo-text { font-family:'Playfair Display',serif; font-size:16px; color:var(--text); }
.app-logo-sep { width:1px; height:14px; background:var(--border); margin:0 2px; align-self:center; }
.app-logo-sub { font-size:12px; color:var(--text-dim); letter-spacing:.03em; }
.header-stats { display:flex; gap:24px; font-size:12px; color:var(--text-dim); }
.header-stats strong { color:var(--text-mid); font-weight:500; }

/* TOOLBAR */
.toolbar {
  padding:12px 28px 10px; display:flex; align-items:center; gap:8px;
  flex-wrap:wrap; border-bottom:1px solid var(--border);
  background:var(--surface); position:sticky; top:52px; z-index:40;
}
.toolbar input, .toolbar select {
  font-family:'Inter',sans-serif; font-size:12px; height:32px;
  padding:0 10px; border-radius:var(--r); border:1px solid var(--border);
  background:var(--bg); color:var(--text); outline:none; transition:border-color .15s;
}
.toolbar input::placeholder { color:var(--text-dim); }
.toolbar input:focus, .toolbar select:focus { border-color:var(--border2); background:var(--surface); }

.wedding-wrap { position:relative; }
.wedding-wrap input { width:210px; }
.wedding-dropdown {
  display:none; position:absolute; top:calc(100% + 4px); left:0;
  width:300px; background:var(--surface); border:1px solid var(--border);
  border-radius:var(--r); box-shadow:0 4px 16px rgba(28,25,22,.1);
  z-index:200; max-height:240px; overflow-y:auto;
}
.wedding-dropdown.open { display:block; }
.wedding-option {
  display:flex; align-items:center; gap:8px; padding:8px 12px;
  cursor:pointer; font-size:12px; color:var(--text-mid); transition:background .1s;
}
.wedding-option:hover { background:var(--bg); }
.wedding-option .w-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.wedding-option .w-date { font-size:10px; color:var(--text-dim); margin-left:auto; }
.wedding-option.selected { background:var(--accent-l); color:var(--text); }

.date-range { display:flex; align-items:center; gap:4px; }
.date-range input { width:132px; }
.date-sep { font-size:11px; color:var(--text-dim); }

.service-filter { display:flex; gap:4px; }
.svc-btn {
  font-family:'Inter',sans-serif; font-size:11px; font-weight:500;
  padding:0 10px; height:32px; border-radius:var(--r);
  border:1px solid var(--border); background:var(--surface);
  color:var(--text-mid); cursor:pointer; transition:all .12s;
  display:flex; align-items:center; gap:4px;
}
.svc-btn:hover { border-color:var(--border2); }
.svc-btn.active-h { background:var(--green-l); color:var(--green); border-color:var(--green); }
.svc-btn.active-a { background:var(--blue-l); color:var(--blue); border-color:var(--blue); }
.svc-btn.active-s { background:var(--rose-l); color:var(--rose); border-color:var(--rose); }
.svc-btn.active-p { background:var(--amber-l); color:var(--amber); border-color:var(--amber); }

.divider { width:1px; height:24px; background:var(--border); margin:0 2px; align-self:center; }

.mass-btn {
  font-family:'Inter',sans-serif; font-size:12px; font-weight:500;
  padding:0 12px; height:32px; border-radius:var(--r);
  border:1px solid var(--border); background:var(--surface);
  color:var(--text-mid); cursor:pointer; display:flex; align-items:center; gap:5px;
  transition:all .12s; margin-left:auto;
}
.mass-btn:hover { border-color:var(--border2); color:var(--text); }
.mass-btn.active { background:var(--text); color:var(--surface); border-color:var(--text); }

.clear-btn {
  font-family:'Inter',sans-serif; font-size:11px; color:var(--text-dim);
  background:none; border:none; cursor:pointer; padding:0 4px;
  display:flex; align-items:center; gap:3px; transition:color .12s;
}
.clear-btn:hover { color:var(--text-mid); }

/* BOARD */
.board-wrap { padding:20px 28px 80px; overflow-x:auto; }
.board { display:flex; gap:12px; min-width:max-content; align-items:flex-start; }

.col {
  width:248px; background:var(--surface); border-radius:var(--rl);
  border:1px solid var(--border); display:flex; flex-direction:column;
  max-height:calc(100vh - 185px);
}
.col.col-future { border-color:#D8CEE8; }
.col.col-done   { border-color:#B0D8D8; }
.col.drag-over  { border-color:var(--accent); background:#FDFCFB; }

.col-header {
  padding:11px 13px 9px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:6px; flex-shrink:0;
  border-radius:var(--rl) var(--rl) 0 0;
}
.col-future .col-header { background:#FDFCFF; }
.col-done   .col-header { background:#F5FAFA; }

.col-title-wrap { flex:1; display:flex; align-items:center; gap:3px; min-width:0; }
.col-title {
  font-size:12px; font-weight:500; color:var(--text);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1;
  cursor:text; padding:2px 5px; border-radius:4px; border:1px solid transparent; transition:border-color .12s;
}
.col-title:hover { border-color:var(--border); }
.col-title-input {
  font-family:'Inter',sans-serif; font-size:12px; font-weight:500; color:var(--text);
  flex:1; min-width:0; padding:2px 5px; border:1px solid var(--border2);
  border-radius:4px; background:var(--bg); outline:none;
}
.col-edit-btn {
  background:none; border:none; cursor:pointer; color:var(--text-dim);
  font-size:12px; display:flex; align-items:center; padding:2px;
  border-radius:3px; flex-shrink:0; opacity:0; transition:all .12s;
}
.col-header:hover .col-edit-btn { opacity:1; }
.col-count {
  font-size:11px; font-weight:500; background:var(--bg); border:1px solid var(--border);
  color:var(--text-dim); border-radius:20px; padding:1px 8px; flex-shrink:0;
}

.col-body {
  padding:8px; display:flex; flex-direction:column; gap:5px;
  overflow-y:auto; flex:1; min-height:60px;
}
.col-body.drag-over-body { background:var(--accent-l); border-radius:0 0 var(--rl) var(--rl); }

/* CARDS */
.card {
  background:var(--bg); border:1px solid var(--border); border-radius:var(--r);
  padding:9px 10px; cursor:grab; transition:border-color .12s,background .12s,opacity .15s,box-shadow .15s;
  position:relative; user-select:none;
}
.card:hover { border-color:var(--border2); background:#FAFAF8; }
.card.selected { border-color:var(--accent); background:var(--accent-l); }
.card.dragging { opacity:.45; cursor:grabbing; box-shadow:0 4px 16px rgba(28,25,22,.12); }
.card-check {
  position:absolute; top:7px; right:7px; width:15px; height:15px;
  border-radius:3px; border:1.5px solid var(--border2); background:var(--surface);
  display:none; align-items:center; justify-content:center;
  font-size:9px; color:#fff; transition:all .12s;
}
.mass-mode .card-check { display:flex; }
.mass-mode .card.selected .card-check { background:var(--accent); border-color:var(--accent); }

.card-top { display:flex; align-items:center; gap:7px; margin-bottom:6px; }
.avatar {
  width:26px; height:26px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:9px; font-weight:600; flex-shrink:0; letter-spacing:.03em;
}
.card-name { font-size:12px; font-weight:500; color:var(--text); line-height:1.3; }
.card-wedding { font-size:10px; color:var(--text-dim); margin-top:1px; }
.card-row { display:flex; align-items:center; gap:5px; font-size:10px; color:var(--text-mid); margin-top:4px; }
.card-row i { font-size:11px; flex-shrink:0; color:var(--text-dim); }
.tags { display:flex; flex-wrap:wrap; gap:3px; margin-top:6px; }
.tag { font-size:9px; font-weight:500; padding:2px 6px; border-radius:4px; letter-spacing:.02em; }
.tag-h { background:var(--green-l); color:var(--green); }
.tag-a { background:var(--blue-l); color:var(--blue); }
.tag-s { background:var(--rose-l); color:var(--rose); }
.tag-p { background:var(--amber-l); color:var(--amber); }
.aereo-ok    { background:var(--green-l); color:var(--green); font-size:9px; font-weight:500; padding:2px 6px; border-radius:4px; }
.aereo-soon  { background:var(--amber-l); color:var(--amber); font-size:9px; font-weight:500; padding:2px 6px; border-radius:4px; }
.aereo-alert { background:#FEF0F0; color:#8A3030; font-size:9px; font-weight:500; padding:2px 6px; border-radius:4px; }

/* drag ghost placeholder */
.card-ghost {
  border:1.5px dashed var(--border2); border-radius:var(--r);
  background:var(--accent-l); opacity:.5; pointer-events:none;
}

.add-btn {
  margin:6px 8px 8px; padding:6px; border:1px dashed var(--border);
  border-radius:var(--r); background:transparent; color:var(--text-dim);
  font-size:11px; font-family:'Inter',sans-serif; cursor:pointer;
  display:flex; align-items:center; justify-content:center; gap:4px;
  transition:all .12s; flex-shrink:0;
}
.add-btn:hover { border-color:var(--border2); color:var(--text-mid); }
.empty { color:var(--text-dim); font-size:11px; text-align:center; padding:20px 0; }

/* MASS BAR */
.mass-bar {
  display:none; position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
  background:var(--text); color:var(--surface); border-radius:30px;
  padding:9px 16px; align-items:center; gap:10px; z-index:200;
  white-space:nowrap; box-shadow:0 4px 24px rgba(28,25,22,.18);
}
.mass-bar.visible { display:flex; }
.mass-bar span { font-size:12px; font-weight:500; }
.mass-bar select {
  font-family:'Inter',sans-serif; font-size:12px; padding:4px 10px;
  border-radius:20px; border:1px solid rgba(255,255,255,.15);
  background:rgba(255,255,255,.08); color:var(--surface); outline:none; cursor:pointer;
}
.mass-bar select option { background:var(--text); }
.mass-move-btn {
  font-family:'Inter',sans-serif; font-size:12px; font-weight:500;
  padding:5px 13px; border-radius:20px; border:none;
  background:var(--surface); color:var(--text); cursor:pointer;
}
.mass-cancel {
  font-family:'Inter',sans-serif; font-size:12px; padding:5px 10px;
  border-radius:20px; border:1px solid rgba(255,255,255,.15);
  background:transparent; color:rgba(255,255,255,.6); cursor:pointer;
}

/* MODAL */
.modal-bg {
  position:fixed; inset:0; background:rgba(28,25,22,.3);
  display:flex; align-items:center; justify-content:center; z-index:300; padding:1rem;
}
.modal {
  background:var(--surface); border-radius:var(--rl); border:1px solid var(--border);
  width:100%; max-width:460px; max-height:90vh; overflow-y:auto;
  box-shadow:0 8px 40px rgba(28,25,22,.12);
}
.modal-header {
  padding:16px 20px 13px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
}
.modal-title { font-family:'Playfair Display',serif; font-size:16px; color:var(--text); }
.modal-close { background:none; border:none; cursor:pointer; color:var(--text-dim); font-size:18px; display:flex; align-items:center; transition:color .12s; }
.modal-close:hover { color:var(--text); }
.modal-body { padding:16px 20px; display:flex; flex-direction:column; gap:12px; }
.fl { font-size:10px; font-weight:600; color:var(--text-dim); text-transform:uppercase; letter-spacing:.08em; margin-bottom:5px; }
.fr { display:grid; grid-template-columns:1fr 1fr; gap:9px; }
.fi {
  font-family:'Inter',sans-serif; font-size:12px; width:100%;
  padding:7px 10px; border-radius:var(--r); border:1px solid var(--border);
  background:var(--bg); color:var(--text); outline:none; transition:border-color .12s;
}
.fi:focus { border-color:var(--border2); background:var(--surface); }
.check-group { display:flex; flex-direction:column; gap:7px; }
.ci { display:flex; align-items:center; gap:7px; font-size:12px; color:var(--text-mid); cursor:pointer; }
.ci input { width:14px; height:14px; cursor:pointer; accent-color:var(--accent); }
.modal-footer { padding:11px 20px 16px; display:flex; justify-content:flex-end; gap:7px; border-top:1px solid var(--border); }
.btn { font-family:'Inter',sans-serif; font-size:12px; font-weight:500; padding:7px 14px; border-radius:var(--r); cursor:pointer; border:1px solid var(--border); background:transparent; color:var(--text-mid); transition:all .12s; }
.btn:hover { border-color:var(--border2); color:var(--text); }
.btn-p { background:var(--text); color:var(--surface); border-color:var(--text); }
.btn-p:hover { opacity:.85; }
.btn-danger { color:#8A3030; margin-right:auto; }
.btn-danger:hover { border-color:#C8A0A0; }
.dr { display:flex; gap:8px; align-items:flex-start; padding:7px 0; border-bottom:1px solid var(--border); }
.dr:last-child { border-bottom:none; }
.dl { font-size:10px; font-weight:600; color:var(--text-dim); text-transform:uppercase; letter-spacing:.07em; width:100px; flex-shrink:0; padding-top:2px; }
.dv { font-size:12px; color:var(--text); flex:1; }
.aereo-info { background:var(--blue-l); border:1px solid #C0D4EA; border-radius:var(--r); padding:8px 11px; font-size:11px; color:var(--blue); line-height:1.5; }

::-webkit-scrollbar { width:4px; height:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:10px; }
</style>
</head>
<body>

<header class="app-header">
  <div class="app-logo">
    <span class="app-logo-text">Welcome Weddings</span>
    <div class="app-logo-sep"></div>
    <span class="app-logo-sub">Embarque</span>
  </div>
  <div class="header-stats">
    <span><strong id="hs-total">0</strong> convidados</span>
    <span><strong id="hs-wed">0</strong> casamentos</span>
  </div>
</header>

<div class="toolbar">
  <input type="text" id="search" placeholder="Buscar convidado...">
  <div class="wedding-wrap" id="weddingWrap">
    <input type="text" id="weddingSearch" placeholder="Casamento..." autocomplete="off"
      oninput="onWeddingInput()" onfocus="onWeddingFocus()" onblur="onWeddingBlur()">
    <div class="wedding-dropdown" id="weddingDropdown"></div>
  </div>
  <div class="divider"></div>
  <div class="date-range">
    <input type="date" id="dateFrom" title="A partir de">
    <span class="date-sep">→</span>
    <input type="date" id="dateTo" title="Até">
  </div>
  <div class="divider"></div>
  <div class="service-filter">
    <button class="svc-btn" id="svc-h" onclick="toggleSvc('hospedagem')">🏨 Hosp.</button>
    <button class="svc-btn" id="svc-a" onclick="toggleSvc('aereo')">✈ Aéreo</button>
    <button class="svc-btn" id="svc-s" onclick="toggleSvc('seguro')">🛡 Seguro</button>
    <button class="svc-btn" id="svc-p" onclick="toggleSvc('transfer')">🚗 Transfer</button>
  </div>
  <div class="divider"></div>
  <button class="clear-btn" onclick="clearFilters()"><i class="ti ti-x"></i> Limpar</button>
  <button class="mass-btn" id="massToggle" onclick="toggleMassMode()">
    <i class="ti ti-checkboxes"></i> Selecionar
  </button>
</div>

<div class="board-wrap">
  <div class="board" id="board"></div>
</div>

<div class="mass-bar" id="massBar">
  <span id="massCount">0 selecionados</span>
  <select id="massTarget"></select>
  <button class="mass-move-btn" onclick="executeMassMove()">Mover</button>
  <button class="mass-cancel" onclick="cancelMassMode()">Cancelar</button>
</div>

<div id="modal" class="modal-bg" style="display:none;">
  <div class="modal" id="mi"></div>
</div>

// ── PERSIST ──────────────────────────────────────────────────────────────────
function save() {
  try { localStorage.setItem(LS_KEY, JSON.stringify({cols,guests})); } catch(e) {}
}
function load() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw) {
      const d = JSON.parse(raw);
      if (d.cols && d.guests) {
        cols = d.cols;
        // ensure finalizado col exists
        if (!cols.find(c=>c.id==='finalizado')) cols.push({id:'finalizado',label:'Finalizado'});
        guests = d.guests;
        const ids = new Set(guests.map(g=>g.id));
        SEED.forEach(g => { if (!ids.has(g.id)) guests.push({...g}); });
        return;
      }
    }
  } catch(e) {}
  guests = SEED.map(g => ({...g}));
}

// ── HELPERS ──────────────────────────────────────────────────────────────────
function wc(w) { const i=WEDDINGS.findIndex(x=>x.nome===w); return COLORS[(i<0?0:i) % COLORS.length]; }
function fmt(d) { if(!d) return '—'; const[y,m,day]=d.split('-'); return `${day}/${m}/${y}`; }
function ini(n) { return n.trim().split(' ').filter(Boolean).slice(0,2).map(x=>x[0]).join('').toUpperCase()||'?'; }
function nights(a,b) { if(!a||!b) return null; return Math.round((new Date(b)-new Date(a))/86400000); }
function daysUntil(d) {
  if (!d) return null;
  const dt=new Date(d), n=new Date(); n.setHours(0,0,0,0); dt.setHours(0,0,0,0);
  return Math.round((dt-n)/86400000);
}
function aereoStatus(g) {
  if (!g.abrioAereo) return null;
  // if guest already has aereo purchased, no alert needed
  if ((g.comprou||[]).includes('aereo')) return null;
  const d = daysUntil(g.abrioAereo);
  if (d===null) return null;
  if (d<=0)  return {label:'Aéreo liberado', cls:'aereo-ok'};
  if (d<=7)  return {label:`Aéreo em ${d}d`, cls:'aereo-alert'};
  if (d<=30) return {label:`Libera em ${d}d`, cls:'aereo-soon'};
  return null;
}
function isFinalizable(g) {
  const c = new Set(g.comprou||[]);
  return c.has('hospedagem') && c.has('aereo') && c.has('seguro');
}
function guestMatchesFilters(g) {
  if (filterW && g.casamento !== filterW) return false;
  if (searchT && !g.nome.toLowerCase().includes(searchT.toLowerCase())) return false;
  if (dateFrom && g.chegada && g.chegada < dateFrom) return false;
  if (dateTo   && g.chegada && g.chegada > dateTo)   return false;
  if (activeSvcs.size && ![...activeSvcs].every(s=>(g.comprou||[]).includes(s))) return false;
  return true;
}
function filtG(cid) { return guests.filter(g => g.col===cid && guestMatchesFilters(g)); }
function totalVisible() { return guests.filter(g=>guestMatchesFilters(g)).length; }
function weddingsVisible() { return new Set(guests.filter(g=>guestMatchesFilters(g)).map(g=>g.casamento)).size; }

// ── WEDDING AUTOCOMPLETE ──────────────────────────────────────────────────────
function onWeddingInput() { filterW=''; renderWeddingDropdown(); render(); }
function onWeddingFocus() { renderWeddingDropdown(); }
function onWeddingBlur() { setTimeout(()=>document.getElementById('weddingDropdown').classList.remove('open'),150); }
function renderWeddingDropdown() {
  const q = document.getElementById('weddingSearch').value.toLowerCase().trim();
  const drop = document.getElementById('weddingDropdown');
  const matches = WEDDINGS.filter(w => !q || w.nome.toLowerCase().includes(q));
  if (!matches.length) { drop.classList.remove('open'); return; }
  drop.innerHTML = matches.map(w => {
    const c=wc(w.nome), sel=filterW===w.nome;
    const cnt=guests.filter(g=>g.casamento===w.nome).length;
    return `<div class="wedding-option${sel?' selected':''}" onmousedown="selectWedding('${w.nome.replace(/'/g,"\\'")}')">
      <span class="w-dot" style="background:${c.dot};"></span>
      <span>${w.nome}</span>
      <span style="font-size:10px;color:var(--text-dim);margin-left:4px;">${cnt}</span>
      <span class="w-date">${fmt(w.data)}</span>
    </div>`;
  }).join('');
  drop.classList.add('open');
}
function selectWedding(nome) {
  filterW = (filterW===nome)?'':nome;
  document.getElementById('weddingSearch').value = filterW;
  document.getElementById('weddingDropdown').classList.remove('open');
  render();
}

// ── SERVICES ─────────────────────────────────────────────────────────────────
const SVC_MAP = {hospedagem:'h',aereo:'a',seguro:'s',transfer:'p'};
function toggleSvc(svc) {
  if(activeSvcs.has(svc)) activeSvcs.delete(svc); else activeSvcs.add(svc);
  Object.entries(SVC_MAP).forEach(([s,k])=>{
    const b=document.getElementById('svc-'+k);
    if(b) b.className='svc-btn'+(activeSvcs.has(s)?` active-${k}`:'');
  });
  render();
}
function clearFilters() {
  searchT=''; filterW=''; dateFrom=''; dateTo=''; activeSvcs.clear();
  document.getElementById('search').value='';
  document.getElementById('weddingSearch').value='';
  document.getElementById('dateFrom').value='';
  document.getElementById('dateTo').value='';
  Object.values(SVC_MAP).forEach(k=>{ const b=document.getElementById('svc-'+k); if(b) b.className='svc-btn'; });
  render();
}

// ── DRAG & DROP ───────────────────────────────────────────────────────────────
function onDragStart(e, gid) {
  if (massMode) return;
  dragGuestId = gid;
  const g = guests.find(x=>x.id===gid);
  dragSourceCol = g ? g.col : null;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', gid);
  const el = e.currentTarget;
  ghostHeight = el.offsetHeight;
  setTimeout(()=>el.classList.add('dragging'), 0);
}
function onDragEnd(e) {
  e.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.col-body').forEach(b=>b.classList.remove('drag-over-body'));
  document.querySelectorAll('.col').forEach(c=>c.classList.remove('drag-over'));
  document.querySelectorAll('.card-ghost').forEach(g=>g.remove());
  dragGuestId=null; dragSourceCol=null;
}
function onDragOver(e, colId) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  document.querySelectorAll('.col').forEach(c=>c.classList.remove('drag-over'));
  const colEl = document.querySelector(`[data-col="${colId}"]`);
  if (colEl) colEl.classList.add('drag-over');
}
function onDragLeave(e, colId) {
  const colEl = document.querySelector(`[data-col="${colId}"]`);
  if (colEl && !colEl.contains(e.relatedTarget)) colEl.classList.remove('drag-over');
}
function onDrop(e, colId) {
  e.preventDefault();
  const gid = e.dataTransfer.getData('text/plain') || dragGuestId;
  if (!gid) return;
  const g = guests.find(x=>x.id===gid);
  if (g) { g.col = colId; save(); }
  document.querySelectorAll('.col').forEach(c=>c.classList.remove('drag-over'));
  render();
}

function renderCard(g) {
  const c=wc(g.casamento);
  const per=(g.chegada||g.saida)?`${fmt(g.chegada)} – ${fmt(g.saida)}`:'';
  const n=nights(g.chegada,g.saida);
  const ae=aereoStatus(g);
  const sel=selected.has(g.id);
  const canFinalize = isFinalizable(g) && g.col !== 'finalizado';

  let tags='';
  if((g.comprou||[]).includes('hospedagem')) tags+=`<span class="tag tag-h">Hosp.</span>`;
  if((g.comprou||[]).includes('aereo'))      tags+=`<span class="tag tag-a">Aéreo</span>`;
  if((g.comprou||[]).includes('seguro'))     tags+=`<span class="tag tag-s">Seguro</span>`;

  if(g.passeio||(g.comprou||[]).includes('passeio')) tags+=`<span class="tag tag-p">Passeio</span>`;
  if(ae&&ae.cls) tags+=`<span class="${ae.cls}">${ae.label}</span>`;
  if(canFinalize) tags+=`<span style="background:var(--done-l);color:var(--done);font-size:9px;font-weight:500;padding:2px 6px;border-radius:4px;cursor:pointer;" onclick="event.stopPropagation();moveToFinalizado('${g.id}')">✓ Finalizar</span>`;

  return `<div class="card${sel?' selected':''}" data-id="${g.id}"
    draggable="true"
    ondragstart="onDragStart(event,'${g.id}')"
    ondragend="onDragEnd(event)"
    onclick="cardClick(event,'${g.id}')">
    <div class="card-check">${sel?'✓':''}</div>
    <div class="card-top">
      <div class="avatar" style="background:${c.l};color:${c.t};">${ini(g.nome)}</div>
      <div>
        <div class="card-name">${g.nome}</div>
        <div class="card-wedding">${g.casamento}</div>
      </div>
    </div>
    ${per?`<div class="card-row"><i class="ti ti-calendar" aria-hidden="true"></i>${per}${n?' · '+n+'n':''}</div>`:''}
    ${tags?`<div class="tags">${tags}</div>`:''}
  </div>`;
}

function moveToFinalizado(gid) {
  const g=guests.find(x=>x.id===gid); if(!g) return;
  g.col='finalizado'; save(); render();
}

function renderColHeader(col) {
  const cnt=filtG(col.id).length;
  const isFuture=col.id==='oportunidade_futura', isDone=col.id==='finalizado';
  const icon = isFuture
    ? `<i class="ti ti-clock" style="font-size:12px;color:var(--future);margin-right:3px;"></i>`
    : isDone
    ? `<i class="ti ti-circle-check" style="font-size:12px;color:var(--done);margin-right:3px;"></i>`
    : '';
  if (editingCol===col.id) {
    return `<div class="col-header">
      <div class="col-title-wrap">
        <input class="col-title-input" id="ci-${col.id}" value="${col.label}"
          onblur="commitCol('${col.id}')"
          onkeydown="if(event.key==='Enter')commitCol('${col.id}');else if(event.key==='Escape'){editingCol=null;render();}">
      </div>
      <span class="col-count">${cnt}</span>
    </div>`;
  }
  return `<div class="col-header">
    <div class="col-title-wrap">
      ${icon}
      <span class="col-title" onclick="startEditCol('${col.id}')">${col.label}</span>
      <button class="col-edit-btn" onclick="startEditCol('${col.id}')" aria-label="Renomear"><i class="ti ti-pencil"></i></button>
    </div>
    <span class="col-count">${cnt}</span>
  </div>`;
}

function render() {
  const board=document.getElementById('board');
  board.className=massMode?'board mass-mode':'board';
  board.innerHTML=cols.map(col=>{
    const cards=filtG(col.id);
    const isFuture=col.id==='oportunidade_futura', isDone=col.id==='finalizado';
    const colClass=`col${isFuture?' col-future':isDone?' col-done':''}`;
    return `<div class="${colClass}" data-col="${col.id}"
      ondragover="onDragOver(event,'${col.id}')"
      ondragleave="onDragLeave(event,'${col.id}')"
      ondrop="onDrop(event,'${col.id}')">
      ${renderColHeader(col)}
      <div class="col-body">
        ${cards.length ? cards.map(renderCard).join('') : '<div class="empty">Nenhum convidado</div>'}
      </div>
      <button class="add-btn" onclick="openAdd('${col.id}')"><i class="ti ti-plus"></i> Adicionar</button>
    </div>`;
  }).join('');

  document.getElementById('massTarget').innerHTML=
    '<option value="">Mover para...</option>'+
    cols.map(c=>`<option value="${c.id}">${c.label}</option>`).join('');

  document.getElementById('hs-total').textContent=totalVisible();
  document.getElementById('hs-wed').textContent=weddingsVisible();
  document.getElementById('massBar').className=massMode&&selected.size?'mass-bar visible':'mass-bar';
  document.getElementById('massCount').textContent=`${selected.size} selecionado${selected.size!==1?'s':''}`;
  document.getElementById('massToggle').className=massMode?'mass-btn active':'mass-btn';

  if (editingCol) setTimeout(()=>{const el=document.getElementById('ci-'+editingCol);if(el){el.focus();el.select();}},20);
}

// ── COL EDIT ─────────────────────────────────────────────────────────────────
function startEditCol(id) { editingCol=id; render(); }
function commitCol(id) {
  const el=document.getElementById('ci-'+id);
  if(el){const v=el.value.trim();if(v){const c=cols.find(x=>x.id===id);if(c)c.label=v;}}
  editingCol=null; save(); render();
}

// ── MASS ─────────────────────────────────────────────────────────────────────
function toggleMassMode() { massMode=!massMode; if(!massMode)selected.clear(); render(); }
function cancelMassMode() { massMode=false; selected.clear(); render(); }
function executeMassMove() {
  const target=document.getElementById('massTarget').value;
  if(!target||!selected.size) return;
  guests.forEach(g=>{if(selected.has(g.id))g.col=target;});
  selected.clear(); save(); render();
}
function cardClick(e,gid) {
  if(massMode){e.stopPropagation();if(selected.has(gid))selected.delete(gid);else selected.add(gid);render();}
  else openDetail(gid);
}

// ── DETAIL ───────────────────────────────────────────────────────────────────
function openDetail(gid) {
  const g=guests.find(x=>x.id===gid); if(!g) return;
  const c=wc(g.casamento);
  const colLabel=cols.find(x=>x.id===g.col)?.label||'—';
  const ae=aereoStatus(g);
  const iL={hospedagem:'Hospedagem',aereo:'Aéreo',seguro:'Seguro',transfer:'Transfer',passeio:'Passeio'};
  const aereoInfo = g.abrioAereo
    ? `<div class="aereo-info">Abertura de aéreo calculada automaticamente: <strong>${fmt(g.abrioAereo)}</strong> (10 meses antes do casamento ${fmt(g.dataCasamento)})</div>`
    : '';
  const finBtn = isFinalizable(g) && g.col!=='finalizado'
    ? `<button class="btn" onclick="moveToFinalizado('${g.id}');closeModal();" style="background:var(--done-l);color:var(--done);border-color:var(--done-l);margin-right:auto;"><i class="ti ti-circle-check" style="font-size:12px;margin-right:3px;"></i>Mover para Finalizado</button>`
    : '';
  document.getElementById('mi').innerHTML=`
    <div class="modal-header">
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="avatar" style="background:${c.l};color:${c.t};width:34px;height:34px;font-size:12px;">${ini(g.nome)}</div>
        <div>
          <div class="modal-title">${g.nome}</div>
          <div style="font-size:11px;color:var(--text-dim);margin-top:1px;">${g.casamento} · ${fmt(g.dataCasamento)}</div>
        </div>
      </div>
      <button class="modal-close" onclick="closeModal()"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body">
      ${aereoInfo}
      <div>
        <div class="dr"><span class="dl">Chegada</span><span class="dv">${fmt(g.chegada)}</span></div>
        <div class="dr"><span class="dl">Saída</span><span class="dv">${fmt(g.saida)}</span></div>
        <div class="dr"><span class="dl">Noites</span><span class="dv">${nights(g.chegada,g.saida)||'—'}</span></div>
        <div class="dr"><span class="dl">Etapa</span><span class="dv">${colLabel}</span></div>
        <div class="dr"><span class="dl">Libera aéreo</span><span class="dv">${fmt(g.abrioAereo)}${ae&&ae.cls?` <span class="${ae.cls}" style="margin-left:5px;">${ae.label}</span>`:''}</span></div>
        <div class="dr"><span class="dl">Comprou</span><span class="dv">${(g.comprou||[]).length?g.comprou.map(x=>iL[x]||x).join(', '):'Nada ainda'}</span></div>
        <div class="dr"><span class="dl">Passeio</span><span class="dv">${g.passeio?'Sim':'Não'}</span></div>
        <div class="dr"><span class="dl">Observação</span><span class="dv">${g.obs||'—'}</span></div>
      </div>
    </div>
    <div class="modal-footer">
      ${finBtn}
      <button class="btn btn-danger" onclick="openEdit('${g.id}')"><i class="ti ti-edit" style="font-size:12px;margin-right:3px;"></i>Editar</button>
      <button class="btn btn-p" onclick="closeModal()">Fechar</button>
    </div>`;
  document.getElementById('modal').style.display='flex';
}

// ── EDIT ─────────────────────────────────────────────────────────────────────
function openEdit(gid) { const g=guests.find(x=>x.id===gid); if(!g) return; renderEdit(g); }
function openAdd(cid) {
  renderEdit({id:null,casamento:WEDDINGS[0]?.nome||'',nome:'',col:cid,chegada:'',saida:'',abrioAereo:'',dataCasamento:'',comprou:[],obs:'',passeio:false});
}
function renderEdit(g) {
  const wOpts=WEDDINGS.map(w=>`<option value="${w.nome}"${w.nome===g.casamento?' selected':''}>${w.nome}</option>`).join('');
  const cOpts=cols.map(c=>`<option value="${c.id}"${c.id===g.col?' selected':''}>${c.label}</option>`).join('');
  const cks=['hospedagem','aereo','seguro','transfer','passeio'].map(x=>`
    <label class="ci"><input type="checkbox" name="cp" value="${x}"${(g.comprou||[]).includes(x)?' checked':''}> ${{hospedagem:'Hospedagem',aereo:'Aéreo',seguro:'Seguro',transfer:'Transfer',passeio:'Passeio'}[x]}</label>`).join('');
  document.getElementById('mi').innerHTML=`
    <div class="modal-header">
      <div class="modal-title">${g.id?'Editar convidado':'Novo convidado'}</div>
      <button class="modal-close" onclick="closeModal()"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body">
      <div><div class="fl">Nome</div><input id="fn" class="fi" type="text" value="${g.nome}" placeholder="Nome completo"></div>
      <div class="fr">
        <div><div class="fl">Casamento</div><select id="fw" class="fi">${wOpts}</select></div>
        <div><div class="fl">Etapa</div><select id="fc" class="fi">${cOpts}</select></div>
      </div>
      <div class="fr">
        <div><div class="fl">Chegada</div><input id="fch" class="fi" type="date" value="${g.chegada||''}"></div>
        <div><div class="fl">Saída</div><input id="fsa" class="fi" type="date" value="${g.saida||''}"></div>
      </div>
      <div><div class="fl">Libera aéreo em</div><input id="fae" class="fi" type="date" value="${g.abrioAereo||''}"></div>
      <div><div class="fl" style="margin-bottom:8px;">O que comprou</div><div class="check-group">${cks}</div></div>
      <div><div class="fl">Observação</div><input id="fob" class="fi" type="text" value="${g.obs||''}" placeholder="Voo, quarto, preferências..."></div>
    </div>
    <div class="modal-footer">
      ${g.id?`<button class="btn btn-danger" onclick="delG('${g.id}')"><i class="ti ti-trash" style="font-size:12px;margin-right:3px;"></i>Remover</button>`:''}
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-p" onclick="saveG('${g.id||''}')">Salvar</button>
    </div>`;
  document.getElementById('modal').style.display='flex';
}
function saveG(gid) {
  const cp=[...document.querySelectorAll('input[name=cp]:checked')].map(e=>e.value);
  const d={
    nome:document.getElementById('fn').value.trim(),
    casamento:document.getElementById('fw').value,
    col:document.getElementById('fc').value,
    chegada:document.getElementById('fch').value,
    saida:document.getElementById('fsa').value,
    abrioAereo:document.getElementById('fae').value,
    comprou:cp, passeio:cp.includes('passeio'),
    obs:document.getElementById('fob').value.trim(),
  };
  if(!d.nome) return;
  // auto-finalize if has all 3
  const cp_set=new Set(d.comprou);
  if(cp_set.has('hospedagem')&&cp_set.has('aereo')&&cp_set.has('seguro')&&d.col!=='oportunidade_futura') {
    d.col='finalizado';
  }
  if(gid){const i=guests.findIndex(g=>g.id===gid);if(i>-1)guests[i]={...guests[i],...d};}
  else guests.push({id:'g'+Date.now(),...d});
  closeModal(); save(); render();
}
function delG(gid) { guests=guests.filter(g=>g.id!==gid); closeModal(); save(); render(); }
function closeModal() { document.getElementById('modal').style.display='none'; }

// ── INIT ─────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  load();
  document.getElementById('search').addEventListener('input', e=>{searchT=e.target.value;render();});
  document.getElementById('dateFrom').addEventListener('change', e=>{dateFrom=e.target.value;render();});
  document.getElementById('dateTo').addEventListener('change', e=>{dateTo=e.target.value;render();});
  document.getElementById('modal').addEventListener('click', e=>{if(e.target===document.getElementById('modal'))closeModal();});
  document.addEventListener('click', e=>{
    if(!document.getElementById('weddingWrap').contains(e.target))
      document.getElementById('weddingDropdown').classList.remove('open');
  });
  render();
});
</script>
</body>
</html>
