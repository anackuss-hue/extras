<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome Weddings — Embarque</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
:root {
  --bg:       #F7F6F4;
  --surface:  #FFFFFF;
  --border:   #E8E5E0;
  --border2:  #D4CFC8;
  --text:     #1C1916;
  --text-mid: #6B6560;
  --text-dim: #A89F96;
  --accent:   #7C6E5A;
  --accent-l: #F0EDE8;
  --green:    #4A7C5F;
  --green-l:  #EAF3EE;
  --blue:     #3D6494;
  --blue-l:   #EBF1F8;
  --rose:     #8A4A5F;
  --rose-l:   #F5ECF0;
  --amber:    #8A6A30;
  --amber-l:  #F5EEE0;
  --r:        6px;
  --rl:       10px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 13px;
  line-height: 1.5;
}

/* ── HEADER ── */
.app-header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 28px;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 50;
}
.app-logo {
  display: flex;
  align-items: baseline;
  gap: 6px;
}
.app-logo-text {
  font-family: 'Playfair Display', serif;
  font-size: 16px;
  color: var(--text);
  letter-spacing: 0.01em;
}
.app-logo-sep {
  width: 1px;
  height: 14px;
  background: var(--border2);
  margin: 0 2px;
  align-self: center;
}
.app-logo-sub {
  font-size: 12px;
  color: var(--text-dim);
  font-weight: 400;
  letter-spacing: 0.03em;
}
.header-stats {
  display: flex;
  gap: 24px;
  font-size: 12px;
  color: var(--text-dim);
}
.header-stats strong { color: var(--text-mid); font-weight: 500; }

/* ── TOOLBAR ── */
.toolbar {
  padding: 14px 28px 12px;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  position: sticky;
  top: 52px;
  z-index: 40;
}

.toolbar input,
.toolbar select {
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  height: 32px;
  padding: 0 10px;
  border-radius: var(--r);
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text);
  outline: none;
  transition: border-color 0.15s;
}
.toolbar input { width: 188px; }
.toolbar input::placeholder { color: var(--text-dim); }
.toolbar input:focus,
.toolbar select:focus { border-color: var(--border2); background: var(--surface); }

.badge-wrap {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
  align-items: center;
}
.wbadge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  font-weight: 500;
  padding: 4px 10px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-mid);
  cursor: pointer;
  transition: all 0.12s;
  white-space: nowrap;
  letter-spacing: 0.01em;
}
.wbadge:hover { border-color: var(--border2); background: var(--bg); }
.wbadge.active { border-color: transparent; color: #fff; }
.wbadge .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

.mass-btn {
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  font-weight: 500;
  padding: 0 12px;
  height: 32px;
  border-radius: var(--r);
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-mid);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 5px;
  transition: all 0.12s;
  margin-left: auto;
}
.mass-btn:hover { border-color: var(--border2); color: var(--text); }
.mass-btn.active {
  background: var(--text);
  color: var(--surface);
  border-color: var(--text);
}

/* ── BOARD ── */
.board-wrap { padding: 20px 28px 40px; overflow-x: auto; }
.board { display: flex; gap: 12px; min-width: max-content; }

.col {
  width: 248px;
  background: var(--surface);
  border-radius: var(--rl);
  border: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  max-height: calc(100vh - 178px);
}

.col-header {
  padding: 11px 13px 9px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}
.col-title-wrap { flex: 1; display: flex; align-items: center; gap: 3px; min-width: 0; }
.col-title {
  font-size: 12px;
  font-weight: 500;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
  cursor: text;
  padding: 2px 5px;
  border-radius: 4px;
  border: 1px solid transparent;
  transition: border-color 0.12s;
  letter-spacing: 0.01em;
}
.col-title:hover { border-color: var(--border); }
.col-title-input {
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  font-weight: 500;
  color: var(--text);
  flex: 1;
  min-width: 0;
  padding: 2px 5px;
  border: 1px solid var(--border2);
  border-radius: 4px;
  background: var(--bg);
  outline: none;
}
.col-edit-btn {
  background: none; border: none; cursor: pointer;
  color: var(--text-dim); font-size: 12px;
  display: flex; align-items: center; padding: 2px;
  border-radius: 3px; flex-shrink: 0;
  transition: color 0.12s;
  opacity: 0;
}
.col-header:hover .col-edit-btn { opacity: 1; }
.col-edit-btn:hover { color: var(--text-mid); }
.col-count {
  font-size: 11px;
  font-weight: 500;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text-dim);
  border-radius: 20px;
  padding: 1px 8px;
  flex-shrink: 0;
}

.col-body {
  padding: 8px;
  display: flex;
  flex-direction: column;
  gap: 5px;
  overflow-y: auto;
  flex: 1;
}

/* ── CARDS ── */
.card {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 9px 10px;
  cursor: pointer;
  transition: border-color 0.12s, background 0.12s;
  position: relative;
}
.card:hover { border-color: var(--border2); background: #FAFAF8; }
.card.selected { border-color: var(--accent); background: var(--accent-l); }
.card-check {
  position: absolute;
  top: 7px; right: 7px;
  width: 15px; height: 15px;
  border-radius: 3px;
  border: 1.5px solid var(--border2);
  background: var(--surface);
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
  font-size: 9px;
  color: #fff;
  transition: all 0.12s;
}
.mass-mode .card-check { display: flex; }
.mass-mode .card.selected .card-check { background: var(--accent); border-color: var(--accent); }

.card-top { display: flex; align-items: center; gap: 7px; margin-bottom: 6px; }
.avatar {
  width: 26px; height: 26px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 600; flex-shrink: 0;
  letter-spacing: 0.03em;
}
.card-name { font-size: 12px; font-weight: 500; color: var(--text); line-height: 1.3; }
.card-wedding { font-size: 10px; color: var(--text-dim); margin-top: 1px; }
.card-row {
  display: flex; align-items: center; gap: 5px;
  font-size: 10px; color: var(--text-mid); margin-top: 4px;
}
.card-row i { font-size: 11px; flex-shrink: 0; color: var(--text-dim); }

.tags { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 6px; }
.tag {
  font-size: 9px; font-weight: 500;
  padding: 2px 6px;
  border-radius: 4px;
  letter-spacing: 0.02em;
}
.tag-h { background: var(--green-l);  color: var(--green); }
.tag-a { background: var(--blue-l);   color: var(--blue); }
.tag-s { background: var(--rose-l);   color: var(--rose); }
.tag-p { background: var(--amber-l);  color: var(--amber); }
.aereo-alert { background: #FEF0F0; color: #8A3030; font-size: 9px; font-weight: 500; padding: 2px 6px; border-radius: 4px; }
.aereo-ok    { background: var(--green-l); color: var(--green); font-size: 9px; font-weight: 500; padding: 2px 6px; border-radius: 4px; }

.add-btn {
  margin: 6px 8px 8px;
  padding: 6px;
  border: 1px dashed var(--border);
  border-radius: var(--r);
  background: transparent;
  color: var(--text-dim);
  font-size: 11px;
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 4px;
  transition: all 0.12s;
  flex-shrink: 0;
}
.add-btn:hover { border-color: var(--border2); color: var(--text-mid); background: var(--bg); }

.empty { color: var(--text-dim); font-size: 11px; text-align: center; padding: 20px 0; }

/* ── MASS BAR ── */
.mass-bar {
  display: none;
  position: fixed;
  bottom: 24px; left: 50%;
  transform: translateX(-50%);
  background: var(--text);
  color: var(--surface);
  border-radius: 30px;
  padding: 9px 16px;
  align-items: center;
  gap: 10px;
  z-index: 200;
  white-space: nowrap;
  box-shadow: 0 4px 24px rgba(28,25,22,0.18);
}
.mass-bar.visible { display: flex; }
.mass-bar span { font-size: 12px; font-weight: 500; }
.mass-bar select {
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  padding: 4px 10px;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.08);
  color: var(--surface);
  outline: none;
  cursor: pointer;
}
.mass-bar select option { background: var(--text); }
.mass-move-btn {
  font-family: 'Inter', sans-serif;
  font-size: 12px; font-weight: 500;
  padding: 5px 13px;
  border-radius: 20px; border: none;
  background: var(--surface); color: var(--text);
  cursor: pointer; transition: opacity 0.12s;
}
.mass-move-btn:hover { opacity: 0.88; }
.mass-cancel {
  font-family: 'Inter', sans-serif;
  font-size: 12px; padding: 5px 10px;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.15);
  background: transparent; color: rgba(255,255,255,0.6);
  cursor: pointer;
}

/* ── MODAL ── */
.modal-bg {
  position: fixed; inset: 0;
  background: rgba(28,25,22,0.3);
  display: flex; align-items: center; justify-content: center;
  z-index: 300; padding: 1rem;
}
.modal {
  background: var(--surface);
  border-radius: var(--rl);
  border: 1px solid var(--border);
  width: 100%; max-width: 460px;
  max-height: 90vh; overflow-y: auto;
  box-shadow: 0 8px 40px rgba(28,25,22,0.12);
}
.modal-header {
  padding: 16px 20px 13px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.modal-title {
  font-family: 'Playfair Display', serif;
  font-size: 16px; color: var(--text);
}
.modal-close {
  background: none; border: none; cursor: pointer;
  color: var(--text-dim); font-size: 18px;
  display: flex; align-items: center;
  transition: color 0.12s;
}
.modal-close:hover { color: var(--text); }
.modal-body { padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; }
.fl { font-size: 10px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 5px; }
.fr { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
.fi {
  font-family: 'Inter', sans-serif; font-size: 12px;
  width: 100%; padding: 7px 10px;
  border-radius: var(--r);
  border: 1px solid var(--border);
  background: var(--bg); color: var(--text);
  outline: none; transition: border-color 0.12s;
}
.fi:focus { border-color: var(--border2); background: var(--surface); }
.check-group { display: flex; flex-direction: column; gap: 7px; }
.ci { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--text-mid); cursor: pointer; }
.ci input { width: 14px; height: 14px; cursor: pointer; accent-color: var(--accent); }
.modal-footer {
  padding: 11px 20px 16px;
  display: flex; justify-content: flex-end; gap: 7px;
  border-top: 1px solid var(--border);
}
.btn {
  font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500;
  padding: 7px 14px; border-radius: var(--r);
  cursor: pointer; border: 1px solid var(--border);
  background: transparent; color: var(--text-mid);
  transition: all 0.12s;
}
.btn:hover { border-color: var(--border2); color: var(--text); }
.btn-p { background: var(--text); color: var(--surface); border-color: var(--text); }
.btn-p:hover { opacity: 0.85; }
.btn-danger { color: #8A3030; margin-right: auto; }
.btn-danger:hover { border-color: #C8A0A0; }

.dr { display: flex; gap: 8px; align-items: flex-start; padding: 7px 0; border-bottom: 1px solid var(--border); }
.dr:last-child { border-bottom: none; }
.dl { font-size: 10px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.07em; width: 100px; flex-shrink: 0; padding-top: 2px; }
.dv { font-size: 12px; color: var(--text); flex: 1; }

::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
</style>
</head>
<body>

<header class="app-header">
  <div class="app-logo">
    <span class="app-logo-text">Welcome Weddings</span>
    <div class="app-logo-sep"></div>
    <span class="app-logo-sub">Embarque</span>
  </div>
  <div class="header-stats">
    <span><strong id="hs-total">0</strong> convidados</span>
    <span><strong id="hs-wed">0</strong> casamentos</span>
  </div>
</header>

<div class="toolbar">

  <div class="badge-wrap" id="badges"></div>
  <button class="mass-btn" id="massToggle" onclick="toggleMassMode()">
    <i class="ti ti-checkboxes"></i> Seleção em massa
  </button>
</div>

<div class="board-wrap">
  <div class="board" id="board"></div>
</div>

<div class="mass-bar" id="massBar">

  <select id="massTarget"></select>
  <button class="mass-move-btn" onclick="executeMassMove()">Mover</button>
  <button class="mass-cancel" onclick="cancelMassMode()">Cancelar</button>
</div>

<div id="modal" class="modal-bg" style="display:none;">
  <div class="modal" id="mi"></div>
</div>

const LS_KEY = 'ww_kanban_v3';

let cols = [
  {id:'a_confirmar', label:'A confirmar'},
  {id:'confirmado',  label:'Confirmado'},
  {id:'embarque',    label:'Embarque'},
  {id:'em_viagem',   label:'Em viagem'},
  {id:'chegou',      label:'Chegou'},
];

let guests = [];
let filterW = '', searchT = '', activeW = new Set();
let editingCol = null, massMode = false, selected = new Set();

function save() {
  try { localStorage.setItem(LS_KEY, JSON.stringify({cols, guests})); } catch(e) {}
}

function load() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw) {
      const d = JSON.parse(raw);
      if (d.cols && d.guests) {
        cols = d.cols;
        guests = d.guests;
        const existingIds = new Set(guests.map(g => g.id));
        SEED.forEach(g => { if (!existingIds.has(g.id)) guests.push({...g}); });
        return;
      }
    }
  } catch(e) {}
  guests = SEED.map(g => ({...g}));
}

function wc(w) { return COLORS[WEDDINGS.indexOf(w) % COLORS.length]; }
function fmt(d) {
  if (!d) return '—';
  const [y,m,day] = d.split('-');
  return `${day}/${m}/${y}`;
}
function ini(n) {
  return n.trim().split(' ').filter(Boolean).slice(0,2).map(x=>x[0]).join('').toUpperCase()||'?';
}
function nights(a,b) {
  if (!a||!b) return null;
  return Math.round((new Date(b)-new Date(a))/86400000);
}
function daysUntil(d) {
  if (!d) return null;
  const dt=new Date(d), n=new Date();
  n.setHours(0,0,0,0); dt.setHours(0,0,0,0);
  return Math.round((dt-n)/86400000);
}
function aereoStatus(g) {
  if (!g.abrioAereo) return null;
  const d = daysUntil(g.abrioAereo);
  if (d===null) return null;
  if (d<=0) return {label:'Aéreo liberado', cls:'aereo-ok'};
  if (d<=7) return {label:`Aéreo em ${d}d`, cls:'aereo-alert'};
  return {label:`Libera em ${d}d`, cls:''};
}

function filtG(cid) {
  return guests.filter(g => {
    if (g.col!==cid) return false;
    if (filterW&&g.casamento!==filterW) return false;
    if (activeW.size&&!activeW.has(g.casamento)) return false;
    if (searchT&&!g.nome.toLowerCase().includes(searchT.toLowerCase())) return false;
    return true;
  });
}

function totalVisible() {
  return guests.filter(g => {
    if (filterW&&g.casamento!==filterW) return false;
    if (activeW.size&&!activeW.has(g.casamento)) return false;
    if (searchT&&!g.nome.toLowerCase().includes(searchT.toLowerCase())) return false;
    return true;
  }).length;
}

function renderCard(g) {
  const c = wc(g.casamento);
  const per = (g.chegada||g.saida) ? `${fmt(g.chegada)} – ${fmt(g.saida)}` : '';
  const n = nights(g.chegada, g.saida);
  const ae = aereoStatus(g);
  const sel = selected.has(g.id);
  let tags = '';
  if ((g.comprou||[]).includes('hospedagem')) tags+=`<span class="tag tag-h">Hosp.</span>`;
  if ((g.comprou||[]).includes('aereo'))      tags+=`<span class="tag tag-a">Aéreo</span>`;
  if ((g.comprou||[]).includes('seguro'))     tags+=`<span class="tag tag-s">Seguro</span>`;
  if ((g.comprou||[]).includes('transfer'))   tags+=`<span class="tag tag-p">Transfer</span>`;
  if (g.passeio||(g.comprou||[]).includes('passeio')) tags+=`<span class="tag tag-p">Passeio</span>`;
  if (ae&&ae.cls) tags+=`<span class="${ae.cls}">${ae.label}</span>`;
  return `<div class="card${sel?' selected':''}" data-id="${g.id}" onclick="cardClick(event,'${g.id}')">
    <div class="card-check">${sel?'✓':''}</div>
    <div class="card-top">
      <div class="avatar" style="background:${c.l};color:${c.t};">${ini(g.nome)}</div>
      <div>
        <div class="card-name">${g.nome}</div>
        <div class="card-wedding">${g.casamento}</div>
      </div>
    </div>
    ${per?`<div class="card-row"><i class="ti ti-calendar" aria-hidden="true"></i>${per}${n?' · '+n+'n':''}</div>`:''}
    ${tags?`<div class="tags">${tags}</div>`:''}
  </div>`;
}

function renderColHeader(col) {
  const cnt = filtG(col.id).length;
  if (editingCol===col.id) {
    return `<div class="col-header">
      <div class="col-title-wrap">
        <input class="col-title-input" id="ci-${col.id}" value="${col.label}"
          onblur="commitCol('${col.id}')"
          onkeydown="if(event.key==='Enter')commitCol('${col.id}');else if(event.key==='Escape'){editingCol=null;render();}">
      </div>
      <span class="col-count">${cnt}</span>
    </div>`;
  }
  return `<div class="col-header">
    <div class="col-title-wrap">
      <span class="col-title" onclick="startEditCol('${col.id}')">${col.label}</span>
      <button class="col-edit-btn" onclick="startEditCol('${col.id}')" aria-label="Renomear coluna"><i class="ti ti-pencil" aria-hidden="true"></i></button>
    </div>
    <span class="col-count">${cnt}</span>
  </div>`;
}

function render() {
  const board = document.getElementById('board');
  board.className = massMode ? 'board mass-mode' : 'board';
  board.innerHTML = cols.map(col => {
    const cards = filtG(col.id);
    return `<div class="col">
      ${renderColHeader(col)}
      <div class="col-body">${cards.length ? cards.map(renderCard).join('') : '<div class="empty">Nenhum convidado</div>'}</div>
      <button class="add-btn" onclick="openAdd('${col.id}')"><i class="ti ti-plus" aria-hidden="true"></i> Adicionar</button>
    </div>`;
  }).join('');

  document.getElementById('badges').innerHTML = WEDDINGS.map(w => {
    const c=wc(w); const active=activeW.has(w);
    return `<button class="wbadge${active?' active':''}" onclick="toggleW('${w.replace(/'/g,"&#39;")}')"
      style="${active?`background:${c.dot};border-color:${c.dot};`:''}">
      <span class="dot" style="background:${c.dot};"></span>${w}
    </button>`;
  }).join('');

  const sel=document.getElementById('fwed'); const cur=sel.value;
  sel.innerHTML='<option value="">Todos os casamentos</option>'+
    WEDDINGS.map(w=>`<option value="${w}"${w===cur?' selected':''}>${w}</option>`).join('');

  document.getElementById('massTarget').innerHTML =
    '<option value="">Mover para...</option>'+
    cols.map(c=>`<option value="${c.id}">${c.label}</option>`).join('');

  document.getElementById('hs-total').textContent = totalVisible();
  document.getElementById('hs-wed').textContent = activeW.size||(filterW?1:WEDDINGS.length);
  document.getElementById('massBar').className = massMode&&selected.size?'mass-bar visible':'mass-bar';
  document.getElementById('massCount').textContent = `${selected.size} selecionado${selected.size!==1?'s':''}`;
  document.getElementById('massToggle').className = massMode?'mass-btn active':'mass-btn';

  if (editingCol) {
    setTimeout(()=>{const el=document.getElementById('ci-'+editingCol);if(el){el.focus();el.select();}},20);
  }
}

function startEditCol(id) { editingCol=id; render(); }
function commitCol(id) {
  const el=document.getElementById('ci-'+id);
  if(el){const v=el.value.trim();if(v){const c=cols.find(x=>x.id===id);if(c)c.label=v;}}
  editingCol=null; save(); render();
}

function toggleMassMode() {
  massMode=!massMode;
  if(!massMode) selected.clear();
  render();
}
function cancelMassMode() { massMode=false; selected.clear(); render(); }
function executeMassMove() {
  const target=document.getElementById('massTarget').value;
  if(!target||!selected.size) return;
  guests.forEach(g=>{ if(selected.has(g.id)) g.col=target; });
  selected.clear(); save(); render();
}

function cardClick(e, gid) {
  if(massMode) {
    e.stopPropagation();
    if(selected.has(gid)) selected.delete(gid); else selected.add(gid);
    render();
  } else { openDetail(gid); }
}

function openDetail(gid) {
  const g=guests.find(x=>x.id===gid); if(!g) return;
  const c=wc(g.casamento);
  const colLabel=cols.find(x=>x.id===g.col)?.label||'—';
  const ae=aereoStatus(g);
  const iL={hospedagem:'Hospedagem',aereo:'Aéreo',seguro:'Seguro',transfer:'Transfer',passeio:'Passeio'};
  document.getElementById('mi').innerHTML=`
    <div class="modal-header">
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="avatar" style="background:${c.l};color:${c.t};width:34px;height:34px;font-size:12px;">${ini(g.nome)}</div>
        <div>
          <div class="modal-title">${g.nome}</div>
          <div style="font-size:11px;color:var(--text-dim);margin-top:1px;">${g.casamento}</div>
        </div>
      </div>
      <button class="modal-close" onclick="closeModal()"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body"><div>
      <div class="dr"><span class="dl">Chegada</span><span class="dv">${fmt(g.chegada)}</span></div>
      <div class="dr"><span class="dl">Saída</span><span class="dv">${fmt(g.saida)}</span></div>
      <div class="dr"><span class="dl">Noites</span><span class="dv">${nights(g.chegada,g.saida)||'—'}</span></div>
      <div class="dr"><span class="dl">Etapa</span><span class="dv">${colLabel}</span></div>
      <div class="dr"><span class="dl">Libera aéreo</span><span class="dv">${fmt(g.abrioAereo)}${ae&&ae.cls?` <span class="${ae.cls}" style="margin-left:5px;">${ae.label}</span>`:''}</span></div>
      <div class="dr"><span class="dl">Comprou</span><span class="dv">${(g.comprou||[]).length?g.comprou.map(x=>iL[x]||x).join(', '):'Nada ainda'}</span></div>
      <div class="dr"><span class="dl">Passeio</span><span class="dv">${g.passeio?'Sim':'Não'}</span></div>
      <div class="dr"><span class="dl">Observação</span><span class="dv">${g.obs||'—'}</span></div>
    </div></div>
    <div class="modal-footer">
      <button class="btn btn-danger" onclick="openEdit('${g.id}')"><i class="ti ti-edit" style="font-size:12px;margin-right:3px;"></i>Editar</button>
      <button class="btn btn-p" onclick="closeModal()">Fechar</button>
    </div>`;
  document.getElementById('modal').style.display='flex';
}

function openEdit(gid) { const g=guests.find(x=>x.id===gid); if(!g) return; renderEdit(g); }
function openAdd(cid) {
  renderEdit({id:null,casamento:WEDDINGS[0]||'',nome:'',col:cid,chegada:'',saida:'',abrioAereo:'',comprou:[],obs:'',passeio:false});
}
function renderEdit(g) {
  const wOpts=WEDDINGS.map(w=>`<option value="${w}"${w===g.casamento?' selected':''}>${w}</option>`).join('');
  const cOpts=cols.map(c=>`<option value="${c.id}"${c.id===g.col?' selected':''}>${c.label}</option>`).join('');
  const cks=['hospedagem','aereo','seguro','transfer','passeio'].map(x=>`
    <label class="ci"><input type="checkbox" name="cp" value="${x}"${(g.comprou||[]).includes(x)?' checked':''}> ${{hospedagem:'Hospedagem',aereo:'Aéreo',seguro:'Seguro',transfer:'Transfer',passeio:'Passeio'}[x]}</label>`).join('');
  document.getElementById('mi').innerHTML=`
    <div class="modal-header">
      <div class="modal-title">${g.id?'Editar convidado':'Novo convidado'}</div>
      <button class="modal-close" onclick="closeModal()"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body">
      <div><div class="fl">Nome</div><input id="fn" class="fi" type="text" value="${g.nome}" placeholder="Nome completo"></div>
      <div class="fr">
        <div><div class="fl">Casamento</div><select id="fw" class="fi">${wOpts}</select></div>
        <div><div class="fl">Etapa</div><select id="fc" class="fi">${cOpts}</select></div>
      </div>
      <div class="fr">
        <div><div class="fl">Chegada</div><input id="fch" class="fi" type="date" value="${g.chegada||''}"></div>
        <div><div class="fl">Saída</div><input id="fsa" class="fi" type="date" value="${g.saida||''}"></div>
      </div>
      <div><div class="fl">Libera aéreo em</div><input id="fae" class="fi" type="date" value="${g.abrioAereo||''}"></div>
      <div><div class="fl" style="margin-bottom:8px;">O que comprou</div><div class="check-group">${cks}</div></div>
      <div><div class="fl">Observação</div><input id="fob" class="fi" type="text" value="${g.obs||''}" placeholder="Voo, quarto, preferências..."></div>
    </div>
    <div class="modal-footer">
      ${g.id?`<button class="btn btn-danger" onclick="delG('${g.id}')"><i class="ti ti-trash" style="font-size:12px;margin-right:3px;"></i>Remover</button>`:''}
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-p" onclick="saveG('${g.id||''}')">Salvar</button>
    </div>`;
  document.getElementById('modal').style.display='flex';
}

function saveG(gid) {
  const cp=[...document.querySelectorAll('input[name=cp]:checked')].map(e=>e.value);
  const d={
    nome:document.getElementById('fn').value.trim(),
    casamento:document.getElementById('fw').value,
    col:document.getElementById('fc').value,
    chegada:document.getElementById('fch').value,
    saida:document.getElementById('fsa').value,
    abrioAereo:document.getElementById('fae').value,
    comprou:cp, passeio:cp.includes('passeio'),
    obs:document.getElementById('fob').value.trim(),
  };
  if(!d.nome) return;
  if(gid){ const i=guests.findIndex(g=>g.id===gid); if(i>-1) guests[i]={...guests[i],...d}; }
  else guests.push({id:'g'+Date.now(),...d});
  closeModal(); save(); render();
}
function delG(gid) { guests=guests.filter(g=>g.id!==gid); closeModal(); save(); render(); }
function closeModal() { document.getElementById('modal').style.display='none'; }
function toggleW(w) { if(activeW.has(w)) activeW.delete(w); else activeW.add(w); render(); }

document.addEventListener('DOMContentLoaded', ()=>{
  load();
  document.getElementById('search').addEventListener('input', e=>{ searchT=e.target.value; render(); });
  document.getElementById('fwed').addEventListener('change', e=>{ filterW=e.target.value; activeW.clear(); render(); });
  document.getElementById('modal').addEventListener('click', e=>{ if(e.target===document.getElementById('modal')) closeModal(); });
  render();
});
</script>
</body>
</html>
