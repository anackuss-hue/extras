<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome Weddings — Embarque</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#F7F6F4;--surface:#FFF;--border:#E8E5E0;--border2:#C8C2BA;
  --text:#1C1916;--text-mid:#6B6560;--text-dim:#A89F96;
  --accent:#7C6E5A;--accent-l:#F0EDE8;
  --green:#4A7C5F;--green-l:#EAF3EE;
  --blue:#3D6494;--blue-l:#EBF1F8;
  --rose:#8A4A5F;--rose-l:#F5ECF0;
  --amber:#8A6A30;--amber-l:#F5EEE0;
  --future:#6A4A8A;--future-l:#EEE8F5;
  --done:#2A6060;--done-l:#E0F2F2;
  --r:6px;--rl:10px;--panel-w:440px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:13px;}

.app-header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.app-logo{display:flex;align-items:baseline;gap:6px;}
.app-logo-text{font-family:'Playfair Display',serif;font-size:16px;}
.app-logo-sep{width:1px;height:14px;background:var(--border);margin:0 2px;align-self:center;}
.app-logo-sub{font-size:12px;color:var(--text-dim);letter-spacing:.03em;}
.header-stats{display:flex;gap:24px;font-size:12px;color:var(--text-dim);}
.header-stats strong{color:var(--text-mid);font-weight:500;}

.nav-tabs{display:flex;gap:2px;background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;position:sticky;top:52px;z-index:49;}
.nav-tab{font-family:'Inter',sans-serif;font-size:12px;font-weight:500;color:var(--text-dim);background:none;border:none;border-bottom:2px solid transparent;padding:10px 14px;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .15s;}
.nav-tab:hover{color:var(--text-mid);}
.nav-tab.active{color:var(--accent);border-bottom-color:var(--accent);}

.page{display:none;}
.page.active{display:block;}

/* TOOLBAR */
.toolbar{padding:11px 28px 9px;display:flex;align-items:center;gap:7px;flex-wrap:wrap;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:95px;z-index:40;}
.toolbar input,.toolbar select{font-family:'Inter',sans-serif;font-size:12px;height:32px;padding:0 10px;border-radius:var(--r);border:1px solid var(--border);background:var(--bg);color:var(--text);outline:none;transition:border-color .15s;}
.toolbar input::placeholder{color:var(--text-dim);}
.toolbar input:focus,.toolbar select:focus{border-color:var(--border2);background:var(--surface);}
.wedding-wrap{position:relative;}
.wedding-wrap input{width:188px;}
.wedding-dropdown{display:none;position:absolute;top:calc(100% + 4px);left:0;width:290px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:0 4px 16px rgba(28,25,22,.1);z-index:200;max-height:240px;overflow-y:auto;}
.wedding-dropdown.open{display:block;}
.wedding-option{display:flex;align-items:center;gap:8px;padding:8px 12px;cursor:pointer;font-size:12px;color:var(--text-mid);}
.wedding-option:hover{background:var(--bg);}
.wedding-option .w-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.wedding-option .w-date{font-size:10px;color:var(--text-dim);margin-left:auto;}
.wedding-option.selected{background:var(--accent-l);color:var(--text);}
.service-filter{display:flex;gap:4px;}
.svc-btn{font-family:'Inter',sans-serif;font-size:11px;font-weight:500;padding:0 9px;height:32px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface);color:var(--text-mid);cursor:pointer;transition:all .12s;display:flex;align-items:center;gap:3px;}
.svc-btn:hover{border-color:var(--border2);}
.svc-btn.active-h{background:var(--green-l);color:var(--green);border-color:var(--green);}
.svc-btn.active-a{background:var(--blue-l);color:var(--blue);border-color:var(--blue);}
.svc-btn.active-s{background:var(--rose-l);color:var(--rose);border-color:var(--rose);}
.svc-btn.active-p{background:var(--amber-l);color:var(--amber);border-color:var(--amber);}
.divider{width:1px;height:22px;background:var(--border);margin:0 1px;align-self:center;}
.mass-btn{font-family:'Inter',sans-serif;font-size:12px;font-weight:500;padding:0 11px;height:32px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface);color:var(--text-mid);cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .12s;margin-left:auto;}
.mass-btn:hover{border-color:var(--border2);color:var(--text);}
.mass-btn.active{background:var(--text);color:var(--surface);border-color:var(--text);}
.clear-btn{font-family:'Inter',sans-serif;font-size:11px;color:var(--text-dim);background:none;border:none;cursor:pointer;padding:0 3px;display:flex;align-items:center;gap:3px;}
.clear-btn:hover{color:var(--text-mid);}

/* BOARD */
.board-wrap{padding:18px 28px 80px;overflow-x:auto;transition:padding-right .28s;}
.board-wrap.panel-open{padding-right:calc(var(--panel-w) + 28px);}
.board{display:flex;gap:12px;min-width:max-content;align-items:flex-start;}
.col{width:252px;background:var(--surface);border-radius:var(--rl);border:1px solid var(--border);display:flex;flex-direction:column;max-height:calc(100vh - 200px);}
.col.col-future{border-color:#D8CEE8;}
.col.col-done{border-color:#B0D8D8;}
.col.drag-over{border-color:var(--accent);background:#FDFCFB;}
.col-header{padding:10px 12px 8px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:5px;flex-shrink:0;border-radius:var(--rl) var(--rl) 0 0;}
.col-future .col-header{background:#FDFCFF;}
.col-done .col-header{background:#F5FAFA;}
.col-title-wrap{flex:1;display:flex;align-items:center;gap:3px;min-width:0;}
.col-title{font-size:12px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;cursor:text;padding:2px 4px;border-radius:4px;border:1px solid transparent;}
.col-title:hover{border-color:var(--border);}
.col-title-input{font-family:'Inter',sans-serif;font-size:12px;font-weight:500;color:var(--text);flex:1;min-width:0;padding:2px 4px;border:1px solid var(--border2);border-radius:4px;background:var(--bg);outline:none;}
.col-edit-btn{background:none;border:none;cursor:pointer;color:var(--text-dim);font-size:11px;display:flex;align-items:center;padding:2px;border-radius:3px;flex-shrink:0;opacity:0;transition:all .12s;}
.col-header:hover .col-edit-btn{opacity:1;}
.col-count{font-size:11px;font-weight:500;background:var(--bg);border:1px solid var(--border);color:var(--text-dim);border-radius:20px;padding:1px 7px;flex-shrink:0;}
.col-body{padding:7px;display:flex;flex-direction:column;gap:5px;overflow-y:auto;flex:1;min-height:60px;}

/* CARDS */
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:9px 10px;cursor:pointer;transition:border-color .12s,box-shadow .12s;position:relative;user-select:none;}
.card:hover{border-color:var(--border2);box-shadow:0 1px 4px rgba(28,25,22,.06);}
.card.selected{border-color:var(--accent);background:var(--accent-l);}
.card.active-panel{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-l);}
.card.dragging{opacity:.4;cursor:grabbing;}
.card-check{position:absolute;top:7px;right:7px;width:15px;height:15px;border-radius:3px;border:1.5px solid var(--border2);background:var(--surface);display:none;align-items:center;justify-content:center;font-size:9px;color:#fff;}
.mass-mode .card-check{display:flex;}
.mass-mode .card.selected .card-check{background:var(--accent);border-color:var(--accent);}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:5px;}
.card-name{font-size:12px;font-weight:500;color:var(--text);line-height:1.3;flex:1;}
.card-vendas{font-size:9px;color:var(--text-dim);font-weight:500;white-space:nowrap;margin-left:4px;margin-top:1px;}
.card-wedding-row{font-size:10px;color:var(--text-dim);margin-bottom:4px;display:flex;align-items:center;gap:4px;}
.card-wedding-row .w-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.card-hotel{font-size:10px;color:var(--text-mid);margin-bottom:4px;display:flex;align-items:center;gap:4px;}
.card-hotel i{font-size:11px;color:var(--text-dim);flex-shrink:0;}
.card-row{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text-mid);margin-bottom:3px;}
.card-row i{font-size:10px;color:var(--text-dim);}
.tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px;}
.tag{font-size:9px;font-weight:500;padding:2px 6px;border-radius:4px;}
.tag-h{background:var(--green-l);color:var(--green);}
.tag-a{background:var(--blue-l);color:var(--blue);}
.tag-s{background:var(--rose-l);color:var(--rose);}
.tag-p{background:var(--amber-l);color:var(--amber);}
.aereo-ok{background:var(--green-l);color:var(--green);font-size:9px;font-weight:500;padding:2px 6px;border-radius:4px;}
.aereo-soon{background:var(--amber-l);color:var(--amber);font-size:9px;font-weight:500;padding:2px 6px;border-radius:4px;}
.aereo-alert{background:#FEF0F0;color:#8A3030;font-size:9px;font-weight:500;padding:2px 6px;border-radius:4px;}
.finalize-tag{background:var(--done-l);color:var(--done);font-size:9px;font-weight:500;padding:2px 6px;border-radius:4px;cursor:pointer;}
.note-badge{font-size:9px;color:var(--text-dim);display:flex;align-items:center;gap:2px;margin-top:3px;}
.add-btn{margin:5px 7px 7px;padding:6px;border:1px dashed var(--border);border-radius:var(--r);background:transparent;color:var(--text-dim);font-size:11px;font-family:'Inter',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;flex-shrink:0;}
.add-btn:hover{border-color:var(--border2);color:var(--text-mid);}
.empty{color:var(--text-dim);font-size:11px;text-align:center;padding:18px 0;}

/* MASS BAR */
.mass-bar{display:none;position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--surface);border-radius:30px;padding:9px 16px;align-items:center;gap:10px;z-index:200;white-space:nowrap;box-shadow:0 4px 24px rgba(28,25,22,.18);}
.mass-bar.visible{display:flex;}
.mass-bar span{font-size:12px;font-weight:500;}
.mass-bar select{font-family:'Inter',sans-serif;font-size:12px;padding:4px 10px;border-radius:20px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08);color:var(--surface);outline:none;cursor:pointer;}
.mass-bar select option{background:var(--text);}
.mass-move-btn{font-family:'Inter',sans-serif;font-size:12px;font-weight:500;padding:5px 13px;border-radius:20px;border:none;background:var(--surface);color:var(--text);cursor:pointer;}
.mass-cancel{font-family:'Inter',sans-serif;font-size:12px;padding:5px 10px;border-radius:20px;border:1px solid rgba(255,255,255,.15);background:transparent;color:rgba(255,255,255,.6);cursor:pointer;}

/* SIDE PANEL */
.panel-overlay{display:none;position:fixed;inset:0;z-index:100;}
.panel-overlay.open{display:block;}
.side-panel{position:fixed;top:0;right:0;bottom:0;width:var(--panel-w);background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;z-index:101;transform:translateX(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);box-shadow:-4px 0 24px rgba(28,25,22,.08);}
.side-panel.open{transform:translateX(0);}
.panel-header{padding:15px 20px 13px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:10px;flex-shrink:0;}
.panel-header-info{flex:1;min-width:0;}
.panel-name{font-family:'Playfair Display',serif;font-size:17px;color:var(--text);line-height:1.2;}
.panel-sub{font-size:11px;color:var(--text-dim);margin-top:3px;}
.panel-close{background:none;border:none;cursor:pointer;color:var(--text-dim);font-size:18px;display:flex;align-items:center;padding:2px;border-radius:4px;flex-shrink:0;}
.panel-close:hover{color:var(--text);}
.panel-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;}
.panel-tab{flex:1;padding:9px 0;font-size:12px;font-weight:500;color:var(--text-dim);background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;transition:all .12s;display:flex;align-items:center;justify-content:center;gap:4px;}
.panel-tab:hover{color:var(--text-mid);}
.panel-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.panel-body{flex:1;overflow-y:auto;}
.panel-section{padding:13px 20px;border-bottom:1px solid var(--border);}
.panel-section:last-child{border-bottom:none;}
.panel-section-title{font-size:10px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:.08em;margin-bottom:9px;}
.col-selector{display:flex;gap:5px;flex-wrap:wrap;}
.col-pill{font-size:11px;font-weight:500;padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text-mid);cursor:pointer;transition:all .12s;}
.col-pill:hover{border-color:var(--border2);}
.col-pill.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.info-field{display:flex;flex-direction:column;gap:3px;}
.info-field.full{grid-column:1/-1;}
.info-label{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.06em;font-weight:500;}
.info-value{font-size:12px;color:var(--text);}
.info-value.editable{font-family:'Inter',sans-serif;width:100%;padding:5px 8px;border-radius:var(--r);border:1px solid transparent;background:transparent;outline:none;transition:all .12s;cursor:pointer;font-size:12px;color:var(--text);}
.info-value.editable:hover{border-color:var(--border);background:var(--bg);}
.info-value.editable:focus{border-color:var(--border2);background:var(--surface);cursor:text;}
.contact-item{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);}
.contact-item:last-child{border-bottom:none;}
.contact-icon{width:26px;height:26px;border-radius:50%;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--text-dim);flex-shrink:0;}
.contact-label{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.04em;}
.contact-val{font-size:12px;color:var(--text);}
.contact-val a{color:var(--blue);text-decoration:none;}
.svc-checks{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.svc-check{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-mid);cursor:pointer;padding:6px 8px;border-radius:var(--r);border:1px solid var(--border);background:var(--bg);transition:all .12s;}
.svc-check input{display:none;}
.svc-check:hover{border-color:var(--border2);}
.svc-check.checked-h{background:var(--green-l);color:var(--green);border-color:var(--green);}
.svc-check.checked-a{background:var(--blue-l);color:var(--blue);border-color:var(--blue);}
.svc-check.checked-s{background:var(--rose-l);color:var(--rose);border-color:var(--rose);}
.svc-check.checked-p{background:var(--amber-l);color:var(--amber);border-color:var(--amber);}
.aereo-box{background:var(--blue-l);border:1px solid #C0D4EA;border-radius:var(--r);padding:8px 11px;font-size:11px;color:var(--blue);display:flex;align-items:center;gap:8px;line-height:1.5;}
.aereo-box i{font-size:15px;flex-shrink:0;}
.finalize-btn{width:100%;padding:9px;border-radius:var(--r);border:1px solid var(--done);background:var(--done-l);color:var(--done);font-family:'Inter',sans-serif;font-size:12px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;}
.finalize-btn:hover{opacity:.8;}
.notes-area{padding:13px 20px;display:flex;flex-direction:column;gap:9px;}
.note-textarea{font-family:'Inter',sans-serif;font-size:12px;color:var(--text);width:100%;min-height:70px;padding:8px 11px;border:1px solid var(--border);border-radius:var(--r);background:var(--bg);resize:vertical;outline:none;line-height:1.6;}
.note-textarea:focus{border-color:var(--border2);background:var(--surface);}
.note-textarea::placeholder{color:var(--text-dim);}
.note-add-btn{align-self:flex-end;font-family:'Inter',sans-serif;font-size:12px;font-weight:500;padding:6px 14px;border-radius:var(--r);border:none;background:var(--text);color:var(--surface);cursor:pointer;}
.note-add-btn:hover{opacity:.85;}
.notes-list{display:flex;flex-direction:column;gap:6px;}
.note-item{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:8px 11px;}
.note-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.note-date{font-size:10px;color:var(--text-dim);}
.note-delete{background:none;border:none;cursor:pointer;color:var(--text-dim);font-size:12px;display:flex;align-items:center;}
.note-delete:hover{color:#8A3030;}
.note-text{font-size:12px;color:var(--text-mid);line-height:1.6;white-space:pre-wrap;}
.history-list{padding:13px 20px;display:flex;flex-direction:column;}
.history-item{display:flex;gap:11px;padding-bottom:13px;position:relative;}
.history-item::before{content:'';position:absolute;left:10px;top:22px;bottom:0;width:1px;background:var(--border);}
.history-item:last-child::before{display:none;}
.history-dot{width:21px;height:21px;border-radius:50%;background:var(--surface);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0;margin-top:1px;}
.history-content{flex:1;padding-top:1px;}
.history-action{font-size:12px;color:var(--text);line-height:1.4;}
.history-time{font-size:10px;color:var(--text-dim);margin-top:2px;}
.empty-state{color:var(--text-dim);font-size:12px;text-align:center;padding:26px 0;display:flex;flex-direction:column;align-items:center;gap:6px;}
.empty-state i{font-size:24px;color:var(--border2);}
.panel-footer{padding:10px 20px;border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0;}
.panel-save-btn{flex:1;font-family:'Inter',sans-serif;font-size:12px;font-weight:500;padding:8px 0;border-radius:var(--r);border:none;background:var(--text);color:var(--surface);cursor:pointer;}
.panel-save-btn:hover{opacity:.85;}
.panel-del-btn{font-family:'Inter',sans-serif;font-size:12px;padding:8px 12px;border-radius:var(--r);border:1px solid var(--border);background:transparent;color:var(--text-dim);cursor:pointer;}
.panel-del-btn:hover{border-color:#C8A0A0;color:#8A3030;}
.venda-chips{display:flex;flex-wrap:wrap;gap:4px;}
.venda-chip{font-size:10px;font-weight:500;padding:2px 8px;border-radius:20px;background:var(--bg);border:1px solid var(--border);color:var(--text-mid);}

/* ═══════════ SEGMENTAÇÃO ═══════════ */
.seg-page{padding:24px 28px;}
.seg-title{font-family:'Playfair Display',serif;font-size:20px;color:var(--text);margin-bottom:4px;}
.seg-subtitle{font-size:12px;color:var(--text-dim);margin-bottom:20px;line-height:1.6;}

/* seg filters bar */
.seg-filters{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:14px 16px;margin-bottom:16px;display:flex;align-items:flex-end;gap:12px;flex-wrap:wrap;}
.seg-filter-group{display:flex;flex-direction:column;gap:4px;}
.seg-filter-label{font-size:10px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:.07em;}
.seg-filter-group input,.seg-filter-group select{font-family:'Inter',sans-serif;font-size:12px;height:32px;padding:0 10px;border-radius:var(--r);border:1px solid var(--border);background:var(--bg);color:var(--text);outline:none;min-width:140px;}
.seg-filter-group input:focus,.seg-filter-group select:focus{border-color:var(--border2);}
.seg-clear-btn{font-family:'Inter',sans-serif;font-size:11px;color:var(--text-dim);background:none;border:1px solid var(--border);border-radius:var(--r);cursor:pointer;padding:0 12px;height:32px;display:flex;align-items:center;gap:4px;transition:all .12s;align-self:flex-end;}
.seg-clear-btn:hover{color:var(--text-mid);border-color:var(--border2);}

.seg-combos-title{font-size:11px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;}
.seg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:24px;}
.seg-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:14px 16px;cursor:pointer;transition:all .15s;position:relative;}
.seg-card:hover{border-color:var(--border2);box-shadow:0 2px 8px rgba(28,25,22,.05);}
.seg-card.active{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-l);}
.seg-card-count{font-size:22px;font-weight:600;color:var(--text);line-height:1;margin-bottom:2px;}
.seg-card-sub{font-size:10px;color:var(--text-dim);margin-bottom:8px;}
.seg-card-tags{display:flex;flex-wrap:wrap;gap:3px;}
.seg-card-tags .tag{font-size:9px;padding:2px 7px;}
.seg-card-check{position:absolute;top:10px;right:10px;width:17px;height:17px;border-radius:4px;border:1.5px solid var(--border2);background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;transition:all .12s;}
.seg-card.active .seg-card-check{background:var(--accent);border-color:var(--accent);}

/* table */
.table-area{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;}
.table-toolbar{padding:11px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.table-toolbar-left{flex:1;}
.table-toolbar-title{font-size:13px;font-weight:500;color:var(--text);}
.table-toolbar-sub{font-size:11px;color:var(--text-dim);margin-top:1px;}
.seg-search{font-family:'Inter',sans-serif;font-size:12px;height:30px;padding:0 10px;border-radius:var(--r);border:1px solid var(--border);background:var(--bg);color:var(--text);outline:none;width:180px;}
.seg-search::placeholder{color:var(--text-dim);}
.seg-search:focus{border-color:var(--border2);}
.export-btn{font-family:'Inter',sans-serif;font-size:12px;font-weight:500;padding:6px 13px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface);color:var(--text-mid);cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .12s;white-space:nowrap;}
.export-btn:hover{border-color:var(--border2);color:var(--text);}
.export-btn.green{background:var(--green-l);color:var(--green);border-color:var(--green);}
.export-btn.dark{background:var(--text);color:var(--surface);border-color:var(--text);}
.export-btn.dark:hover{opacity:.85;}

.data-table{width:100%;border-collapse:collapse;font-size:12px;}
.data-table th{padding:8px 11px;text-align:left;font-size:10px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border);background:var(--bg);white-space:nowrap;}
.data-table td{padding:8px 11px;border-bottom:1px solid var(--border);color:var(--text-mid);vertical-align:middle;}
.data-table tr:last-child td{border-bottom:none;}
.data-table tr:hover td{background:#FAFAF8;}
.data-table .td-name{font-weight:500;color:var(--text);}
.data-table .td-mono{font-family:monospace;font-size:11px;}
.empty-table{padding:28px;text-align:center;color:var(--text-dim);font-size:12px;}

::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px;}
</style>
</head>

<header class="app-header">
  <div class="app-logo">
    <span class="app-logo-text">Welcome Weddings</span>
    <div class="app-logo-sep"></div>
    <span class="app-logo-sub">Embarque</span>
  </div>
  <div class="header-stats">
    <span><strong id="hs-total">0</strong> pessoas</span>
    <span><strong id="hs-wed">0</strong> casamentos</span>
  </div>
</header>

<div class="nav-tabs">
  <button class="nav-tab active" id="ntab-kanban" onclick="switchPage('kanban')"><i class="ti ti-layout-kanban"></i> Kanban</button>
  <button class="nav-tab" id="ntab-seg" onclick="switchPage('seg')"><i class="ti ti-filter"></i> Segmentação</button>
</div>

<!-- PAGE: KANBAN -->
<div class="page active" id="page-kanban">
  <div class="toolbar">
    <input type="text" id="search" placeholder="Buscar pessoa...">
    <div class="wedding-wrap" id="weddingWrap">
      <input type="text" id="weddingSearch" placeholder="Casamento..." autocomplete="off"
        oninput="onWeddingInput()" onfocus="onWeddingFocus()" onblur="onWeddingBlur()">
      <div class="wedding-dropdown" id="weddingDropdown"></div>
    </div>
    <select id="hotelFilter" onchange="render()"><option value="">Todos os hotéis</option></select>
    <select id="cityFilter" onchange="render()"><option value="">Todas as cidades</option></select>
    <div class="divider"></div>
    <div class="service-filter">
      <button class="svc-btn" id="svc-h" onclick="toggleSvc('hospedagem')">🏨</button>
      <button class="svc-btn" id="svc-a" onclick="toggleSvc('aereo')">✈</button>
      <button class="svc-btn" id="svc-s" onclick="toggleSvc('seguro')">🛡</button>
      <button class="svc-btn" id="svc-p" onclick="toggleSvc('transfer')">🚗</button>
    </div>
    <div class="divider"></div>
    <button class="clear-btn" onclick="clearFilters()"><i class="ti ti-x"></i> Limpar</button>
    <button class="mass-btn" id="massToggle" onclick="toggleMassMode()"><i class="ti ti-checkboxes"></i> Selecionar</button>
  </div>
  <div class="board-wrap" id="boardWrap">
    <div class="board" id="board"></div>
  </div>
</div>

<!-- PAGE: SEGMENTAÇÃO -->
<div class="page" id="page-seg">
  <div class="seg-page">
    <div class="seg-title">Segmentação para disparos</div>
    <div class="seg-subtitle">Filtre por período, hotel ou cidade. Selecione uma ou mais combinações de serviços. Exporte para CSV ou Excel.</div>

    <div class="seg-filters">
      <div class="seg-filter-group">
        <span class="seg-filter-label">Chegada de</span>
        <input type="date" id="segDateFrom" oninput="renderSegPage()">
      </div>
      <div class="seg-filter-group">
        <span class="seg-filter-label">Chegada até</span>
        <input type="date" id="segDateTo" oninput="renderSegPage()">
      </div>
      <div class="seg-filter-group">
        <span class="seg-filter-label">Hotel</span>
        <select id="segHotel" onchange="renderSegPage()"><option value="">Todos os hotéis</option></select>
      </div>
      <div class="seg-filter-group">
        <span class="seg-filter-label">Cidade</span>
        <select id="segCity" onchange="renderSegPage()"><option value="">Todas as cidades</option></select>
      </div>
      <div class="seg-filter-group">
        <span class="seg-filter-label">Casamento</span>
        <select id="segWedding" onchange="renderSegPage()"><option value="">Todos</option></select>
      </div>
      <button class="seg-clear-btn" onclick="clearSegFilters()"><i class="ti ti-x"></i> Limpar</button>
    </div>

    <div class="seg-combos-title">Combinações de serviços</div>
    <div class="seg-grid" id="segGrid"></div>

    <div class="table-area">
      <div class="table-toolbar">
        <div class="table-toolbar-left">
          <div class="table-toolbar-title" id="tableTitle">Todos os passageiros</div>
          <div class="table-toolbar-sub" id="tableSub"></div>
        </div>
        <input class="seg-search" id="segSearch" placeholder="Filtrar por nome..." oninput="renderTable()">
        <button class="export-btn green" onclick="exportCSV()"><i class="ti ti-file-text"></i> CSV</button>
        <button class="export-btn dark" onclick="exportXLSX()"><i class="ti ti-file-spreadsheet"></i> Excel</button>
      </div>
      <div id="tableContainer"></div>
    </div>
  </div>
</div>

<!-- SIDE PANEL -->
<div class="panel-overlay" id="panelOverlay" onclick="closePanel()"></div>
<div class="side-panel" id="sidePanel">
  <div class="panel-header" id="panelHeader"></div>
  <div class="panel-tabs">
    <button class="panel-tab active" id="tab-info" onclick="switchTab('info')"><i class="ti ti-user"></i> Info</button>
    <button class="panel-tab" id="tab-notas" onclick="switchTab('notas')"><i class="ti ti-note"></i> Notas</button>
    <button class="panel-tab" id="tab-hist" onclick="switchTab('hist')"><i class="ti ti-history"></i> Histórico</button>
  </div>
  <div class="panel-body" id="panelBody"></div>
  <div class="panel-footer" id="panelFooter"></div>
</div>

<div class="mass-bar" id="massBar">
  <span id="massCount">0 selecionados</span>
  <select id="massTarget"></select>
  <button class="mass-move-btn" onclick="executeMassMove()">Mover</button>
  <button class="mass-cancel" onclick="cancelMassMode()">Cancelar</button>
</div>

<script>

const COLORS=[
  {dot:'#7C6E5A',l:'#F0EDE8',t:'#4A4030'},{dot:'#4A7C5F',l:'#EAF3EE',t:'#264035'},
  {dot:'#3D6494',l:'#EBF1F8',t:'#1E3650'},{dot:'#8A4A5F',l:'#F5ECF0',t:'#4A2030'},
  {dot:'#7A6A30',l:'#F5EEE0',t:'#3A3010'},{dot:'#5A3D7A',l:'#EDE8F5',t:'#2E1A40'},
  {dot:'#3D7A6A',l:'#E8F3F0',t:'#1A4038'},{dot:'#7A3D3D',l:'#F5E8E8',t:'#401818'},
  {dot:'#5A4A7A',l:'#EDEAF5',t:'#2A2040'},{dot:'#3D5A7A',l:'#E8EEF5',t:'#182840'},
  {dot:'#6A5A3D',l:'#F0EDE5',t:'#362E18'},{dot:'#3D7A5A',l:'#E8F5EC',t:'#1A4030'},
];
const LS_KEY='ww_kanban_v9';
const SVC_LABELS={hospedagem:'🏨 Hospedagem',aereo:'✈ Aéreo',seguro:'🛡 Seguro',transfer:'🚗 Transfer'};
const SVC_TAG_CLS={hospedagem:'tag-h',aereo:'tag-a',seguro:'tag-s',transfer:'tag-p'};
const SVC_CHK_CLS={hospedagem:'checked-h',aereo:'checked-a',seguro:'checked-s',transfer:'checked-p'};

let cols=[
  {id:'oportunidade_futura',label:'Oportunidade futura'},
  {id:'a_confirmar',label:'A confirmar'},
  {id:'confirmado',label:'Confirmado'},
  {id:'embarque',label:'Embarque'},
  {id:'em_viagem',label:'Em viagem'},
  {id:'chegou',label:'Chegou'},
  {id:'finalizado',label:'Finalizado'},
];

let persons=[], searchT='', filterW='', filterHotel='', filterCity='';
let activeSvcs=new Set(), editingCol=null, massMode=false, selected=new Set();
let activePanelId=null, activeTab='info', dragId=null, activePage='kanban';
let activeSegKeys=new Set();

// ── PERSIST ──────────────────────────────────────────────────────────────────
function save(){try{localStorage.setItem(LS_KEY,JSON.stringify({cols,persons}));}catch(e){}}
function load(){
  try{
    const raw=localStorage.getItem(LS_KEY);
    if(raw){
      const d=JSON.parse(raw);
      if(d.cols&&d.persons){
        cols=d.cols;
        if(!cols.find(c=>c.id==='finalizado'))cols.push({id:'finalizado',label:'Finalizado'});
        persons=d.persons;
        const ids=new Set(persons.map(p=>p.id));
        SEED.forEach(s=>{if(!ids.has(s.id))persons.push({...s,notas:[],historico:[]});});
        return;
      }
    }
  }catch(e){}
  persons=SEED.map(s=>({...s,notas:s.notas||[],historico:s.historico||[]}));
}

// ── HELPERS ──────────────────────────────────────────────────────────────────
function wc(w){const i=WEDDINGS.findIndex(x=>x.nome===w);return COLORS[(i<0?0:i)%COLORS.length];}
function fmt(d){if(!d||d==='—')return'—';try{const parts=String(d).split('T')[0].split('-');return`${parts[2]}/${parts[1]}/${parts[0]}`;}catch{return d;}}
function fmtTs(ts){const d=new Date(ts);return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'})+' às '+d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});}
function ini(n){return(n||'?').trim().split(' ').filter(Boolean).slice(0,2).map(x=>x[0]).join('').toUpperCase()||'?';}
function nights(a,b){if(!a||!b)return null;return Math.round((new Date(b)-new Date(a))/86400000);}
function daysUntil(d){if(!d)return null;const dt=new Date(d),n=new Date();n.setHours(0,0,0,0);dt.setHours(0,0,0,0);return Math.round((dt-n)/86400000);}
function aereoStatus(p){
  if(!p.abrioAereo||(p.servicos||[]).includes('aereo'))return null;
  const d=daysUntil(p.abrioAereo);
  if(d===null)return null;
  if(d<=0)return{label:'Aéreo liberado',cls:'aereo-ok'};
  if(d<=7)return{label:`Aéreo em ${d}d`,cls:'aereo-alert'};
  if(d<=30)return{label:`Libera em ${d}d`,cls:'aereo-soon'};
  return null;
}
function isFinalizable(p){const s=new Set(p.servicos||[]);return s.has('hospedagem')&&s.has('aereo')&&s.has('seguro');}
function personMatchesFilters(p){
  if(filterW&&p.casamento!==filterW)return false;
  if(filterHotel&&p.hotel!==filterHotel)return false;
  if(filterCity&&p.cidade!==filterCity)return false;
  if(searchT&&!p.nome.toLowerCase().includes(searchT.toLowerCase()))return false;
  if(activeSvcs.size&&![...activeSvcs].every(s=>(p.servicos||[]).includes(s)))return false;
  return true;
}
function filtP(cid){return persons.filter(p=>p.col===cid&&personMatchesFilters(p));}
function totalVisible(){return persons.filter(p=>personMatchesFilters(p)).length;}
function weddingsVisible(){return new Set(persons.filter(p=>personMatchesFilters(p)).map(p=>p.casamento)).size;}
function addHistory(p,action){if(!p.historico)p.historico=[];p.historico.unshift({ts:Date.now(),action});if(p.historico.length>60)p.historico=p.historico.slice(0,60);}

// ── PAGE NAV ─────────────────────────────────────────────────────────────────
function switchPage(page){
  activePage=page;
  ['kanban','seg'].forEach(p=>{
    document.getElementById('page-'+p).className='page'+(p===page?' active':'');
    document.getElementById('ntab-'+p).className='nav-tab'+(p===page?' active':'');
  });
  if(page==='seg') renderSegPage();
}

// populate selects
function populateSelects(){
  const hSel=document.getElementById('hotelFilter');
  const cSel=document.getElementById('cityFilter');
  const curH=hSel.value, curC=cSel.value;
  hSel.innerHTML='<option value="">Todos os hotéis</option>'+HOTELS.map(([h])=>`<option value="${h}"${h===curH?' selected':''}>${h}</option>`).join('');
  cSel.innerHTML='<option value="">Todas as cidades</option>'+CITIES.map(c=>`<option value="${c}"${c===curC?' selected':''}>${c}</option>`).join('');
  // seg selects
  const sgH=document.getElementById('segHotel'), sgC=document.getElementById('segCity'), sgW=document.getElementById('segWedding');
  if(sgH) sgH.innerHTML='<option value="">Todos os hotéis</option>'+HOTELS.map(([h])=>`<option value="${h}">${h}</option>`).join('');
  if(sgC) sgC.innerHTML='<option value="">Todas as cidades</option>'+CITIES.map(c=>`<option value="${c}">${c}</option>`).join('');
  if(sgW) sgW.innerHTML='<option value="">Todos</option>'+WEDDINGS.map(w=>`<option value="${w.nome}">${w.nome}</option>`).join('');
}

// ── WEDDING AUTOCOMPLETE ──────────────────────────────────────────────────────
function onWeddingInput(){filterW='';renderWeddingDropdown();render();}
function onWeddingFocus(){renderWeddingDropdown();}
function onWeddingBlur(){setTimeout(()=>document.getElementById('weddingDropdown').classList.remove('open'),150);}
function renderWeddingDropdown(){
  const q=document.getElementById('weddingSearch').value.toLowerCase().trim();
  const drop=document.getElementById('weddingDropdown');
  const matches=WEDDINGS.filter(w=>!q||w.nome.toLowerCase().includes(q));
  if(!matches.length){drop.classList.remove('open');return;}
  drop.innerHTML=matches.map(w=>{
    const c=wc(w.nome),sel=filterW===w.nome;
    const cnt=persons.filter(p=>p.casamento===w.nome).length;
    return`<div class="wedding-option${sel?' selected':''}" onmousedown="selectWedding('${w.nome.replace(/'/g,"\\'")}')">
      <span class="w-dot" style="background:${c.dot};"></span><span>${w.nome}</span>
      <span style="font-size:10px;color:var(--text-dim);margin-left:4px;">${cnt}</span>
      <span class="w-date">${fmt(w.data)}</span>
    </div>`;
  }).join('');
  drop.classList.add('open');
}
function selectWedding(nome){
  filterW=(filterW===nome)?'':nome;
  document.getElementById('weddingSearch').value=filterW;
  document.getElementById('weddingDropdown').classList.remove('open');
  render();
}

// ── SERVICES FILTER ───────────────────────────────────────────────────────────
const SVC_MAP={hospedagem:'h',aereo:'a',seguro:'s',transfer:'p'};
function toggleSvc(svc){
  if(activeSvcs.has(svc))activeSvcs.delete(svc);else activeSvcs.add(svc);
  Object.entries(SVC_MAP).forEach(([s,k])=>{const b=document.getElementById('svc-'+k);if(b)b.className='svc-btn'+(activeSvcs.has(s)?` active-${k}`:'');});
  render();
}
function clearFilters(){
  searchT='';filterW='';filterHotel='';filterCity='';activeSvcs.clear();
  ['search','weddingSearch'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  document.getElementById('hotelFilter').value='';
  document.getElementById('cityFilter').value='';
  Object.values(SVC_MAP).forEach(k=>{const b=document.getElementById('svc-'+k);if(b)b.className='svc-btn';});
  render();
}

// ── DRAG & DROP ───────────────────────────────────────────────────────────────
function onDragStart(e,id){if(massMode)return;dragId=id;e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',id);setTimeout(()=>e.target.classList.add('dragging'),0);}
function onDragEnd(e){e.target.classList.remove('dragging');document.querySelectorAll('.col').forEach(c=>c.classList.remove('drag-over'));dragId=null;}
function onDragOver(e,cid){e.preventDefault();document.querySelectorAll('.col').forEach(c=>c.classList.remove('drag-over'));const el=document.querySelector(`[data-col="${cid}"]`);if(el)el.classList.add('drag-over');}
function onDragLeave(e,cid){const el=document.querySelector(`[data-col="${cid}"]`);if(el&&!el.contains(e.relatedTarget))el.classList.remove('drag-over');}
function onDrop(e,cid){
  e.preventDefault();const id=e.dataTransfer.getData('text/plain')||dragId;if(!id)return;
  const p=persons.find(x=>x.id===id);
  if(p&&p.col!==cid){
    const oL=cols.find(c=>c.id===p.col)?.label||p.col;
    const nL=cols.find(c=>c.id===cid)?.label||cid;
    addHistory(p,`Movido de "${oL}" para "${nL}"`);
    p.col=cid;save();if(activePanelId===id)renderPanel();
  }
  document.querySelectorAll('.col').forEach(c=>c.classList.remove('drag-over'));render();
}

// ── RENDER BOARD ──────────────────────────────────────────────────────────────
function renderCard(p){
  const c=wc(p.casamento);
  const n=nights(p.chegada,p.saida);
  const ae=aereoStatus(p);
  const sel=selected.has(p.id), isActive=activePanelId===p.id;
  const vendas=(p.vendas||[]);
  const vendasLabel=vendas.length===1?`#${vendas[0]}`:`${vendas.length} vendas`;
  let tags='';
  if((p.servicos||[]).includes('hospedagem'))tags+=`<span class="tag tag-h">Hosp.</span>`;
  if((p.servicos||[]).includes('aereo'))tags+=`<span class="tag tag-a">Aéreo</span>`;
  if((p.servicos||[]).includes('seguro'))tags+=`<span class="tag tag-s">Seguro</span>`;
  if((p.servicos||[]).includes('transfer'))tags+=`<span class="tag tag-p">Transfer</span>`;
  if(ae&&ae.cls)tags+=`<span class="${ae.cls}">${ae.label}</span>`;
  if(isFinalizable(p)&&p.col!=='finalizado')tags+=`<span class="finalize-tag" onclick="event.stopPropagation();quickFinalize('${p.id}')">✓ Finalizar</span>`;
  const noteBadge=(p.notas||[]).length?`<div class="note-badge"><i class="ti ti-note" style="font-size:9px;"></i>${p.notas.length}</div>`:'';
  const hotelLine=p.hotel?`<div class="card-hotel"><i class="ti ti-building"></i>${p.hotel}${p.cidade?` <span style="color:var(--text-dim)">· ${p.cidade}</span>`:''}</div>`:'';
  return`<div class="card${sel?' selected':''}${isActive?' active-panel':''}" data-id="${p.id}"
    draggable="true" ondragstart="onDragStart(event,'${p.id}')" ondragend="onDragEnd(event)"
    onclick="cardClick(event,'${p.id}')">
    <div class="card-check">${sel?'✓':''}</div>
    <div class="card-top">
      <div>
        <div class="card-name">${p.nome}</div>
        <div class="card-vendas">${vendasLabel}</div>
      </div>
      <div class="avatar" style="background:${c.l};color:${c.t};width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:600;flex-shrink:0;">${ini(p.nome)}</div>
    </div>
    <div class="card-wedding-row"><span class="w-dot" style="background:${c.dot};"></span>${p.casamento}</div>
    ${hotelLine}
    ${(p.chegada||p.saida)?`<div class="card-row"><i class="ti ti-calendar"></i>${fmt(p.chegada)} – ${fmt(p.saida)}${n?` · ${n}n`:''}</div>`:''}
    ${tags?`<div class="tags">${tags}</div>`:''}
    ${noteBadge}
  </div>`;
}

function renderColHeader(col){
  const cnt=filtP(col.id).length;
  const isFuture=col.id==='oportunidade_futura',isDone=col.id==='finalizado';
  const icon=isFuture?`<i class="ti ti-clock" style="font-size:11px;color:var(--future);margin-right:3px;"></i>`:isDone?`<i class="ti ti-circle-check" style="font-size:11px;color:var(--done);margin-right:3px;"></i>`:'';
  if(editingCol===col.id){return`<div class="col-header"><div class="col-title-wrap"><input class="col-title-input" id="ci-${col.id}" value="${col.label}" onblur="commitCol('${col.id}')" onkeydown="if(event.key==='Enter')commitCol('${col.id}');else if(event.key==='Escape'){editingCol=null;render();}"></div><span class="col-count">${cnt}</span></div>`;}
  return`<div class="col-header"><div class="col-title-wrap">${icon}<span class="col-title" onclick="startEditCol('${col.id}')">${col.label}</span><button class="col-edit-btn" onclick="startEditCol('${col.id}')"><i class="ti ti-pencil"></i></button></div><span class="col-count">${cnt}</span></div>`;
}

function render(){
  if(activePage!=='kanban')return;
  filterHotel=document.getElementById('hotelFilter')?.value||'';
  filterCity=document.getElementById('cityFilter')?.value||'';
  const board=document.getElementById('board');
  board.className=massMode?'board mass-mode':'board';
  board.innerHTML=cols.map(col=>{
    const ps=filtP(col.id);
    const isFuture=col.id==='oportunidade_futura',isDone=col.id==='finalizado';
    return`<div class="col${isFuture?' col-future':isDone?' col-done':''}" data-col="${col.id}"
      ondragover="onDragOver(event,'${col.id}')" ondragleave="onDragLeave(event,'${col.id}')" ondrop="onDrop(event,'${col.id}')">
      ${renderColHeader(col)}
      <div class="col-body">${ps.length?ps.map(renderCard).join(''):'<div class="empty">Nenhuma pessoa</div>'}</div>
      <button class="add-btn" onclick="openAddPanel('${col.id}')"><i class="ti ti-plus"></i> Adicionar</button>
    </div>`;
  }).join('');
  document.getElementById('massTarget').innerHTML='<option value="">Mover para...</option>'+cols.map(c=>`<option value="${c.id}">${c.label}</option>`).join('');
  document.getElementById('hs-total').textContent=totalVisible();
  document.getElementById('hs-wed').textContent=weddingsVisible();
  document.getElementById('massBar').className=massMode&&selected.size?'mass-bar visible':'mass-bar';
  document.getElementById('massCount').textContent=`${selected.size} selecionado${selected.size!==1?'s':''}`;
  document.getElementById('massToggle').className=massMode?'mass-btn active':'mass-btn';
  if(editingCol)setTimeout(()=>{const el=document.getElementById('ci-'+editingCol);if(el){el.focus();el.select();}},20);
}

// ── SEGMENTATION ─────────────────────────────────────────────────────────────
function getSegFiltered(){
  const df=document.getElementById('segDateFrom')?.value||'';
  const dt=document.getElementById('segDateTo')?.value||'';
  const sh=document.getElementById('segHotel')?.value||'';
  const sc=document.getElementById('segCity')?.value||'';
  const sw=document.getElementById('segWedding')?.value||'';
  return persons.filter(p=>{
    if(sh&&p.hotel!==sh)return false;
    if(sc&&p.cidade!==sc)return false;
    if(sw&&p.casamento!==sw)return false;
    if(df&&p.chegada&&p.chegada<df)return false;
    if(dt&&p.chegada&&p.chegada>dt)return false;
    return true;
  });
}

function getComboKey(svcs){return [...svcs].sort().join('+')||'__none__';}

function renderSegPage(){
  const filtered=getSegFiltered();
  // build combos from filtered
  const comboMap={};
  filtered.forEach(p=>{
    const key=getComboKey(p.servicos||[]);
    if(!comboMap[key]){comboMap[key]={svcs:(p.servicos||[]).slice().sort(),count:0};}
    comboMap[key].count++;
  });
  const sorted=Object.entries(comboMap).sort((a,b)=>b[1].count-a[1].count);
  document.getElementById('segGrid').innerHTML=sorted.map(([key,data])=>{
    const isActive=activeSegKeys.has(key);
    const tagsHtml=data.svcs.length
      ?data.svcs.map(s=>`<span class="tag ${SVC_TAG_CLS[s]||''}">${SVC_LABELS[s]||s}</span>`).join('')
      :`<span class="tag" style="background:var(--bg);color:var(--text-dim);">Sem serviço</span>`;
    return`<div class="seg-card${isActive?' active':''}" onclick="toggleSegKey('${key}')">
      <div class="seg-card-check">${isActive?'✓':''}</div>
      <div class="seg-card-count">${data.count}</div>
      <div class="seg-card-sub">pessoa${data.count!==1?'s':''}</div>
      <div class="seg-card-tags">${tagsHtml}</div>
    </div>`;
  }).join('');
  renderTable();
}

function toggleSegKey(key){
  if(activeSegKeys.has(key))activeSegKeys.delete(key);else activeSegKeys.add(key);
  renderSegPage();
}

function clearSegFilters(){
  ['segDateFrom','segDateTo','segHotel','segCity','segWedding'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  activeSegKeys.clear();
  renderSegPage();
}

function getTableRows(){
  const filtered=getSegFiltered();
  const segQ=(document.getElementById('segSearch')?.value||'').toLowerCase().trim();
  const rows=[];
  filtered.forEach(p=>{
    const key=getComboKey(p.servicos||[]);
    if(activeSegKeys.size&&!activeSegKeys.has(key))return;
    if(segQ&&!p.nome.toLowerCase().includes(segQ))return;
    rows.push({
      nome:p.nome, casamento:p.casamento, dataCasamento:p.dataCasamento,
      chegada:p.chegada||'', saida:p.saida||'',
      hotel:p.hotel||'', cidade:p.cidade||'',
      servicos:(p.servicos||[]).join(', '),
      etapa:cols.find(c=>c.id===p.col)?.label||p.col,
      email:p.email||'', celular:p.celular||'',
      telefone:p.telefone||'', cpf:p.cpf||'',
      vendas:(p.vendas||[]).join(', '),
    });
  });
  return rows;
}

function renderTable(){
  const rows=getTableRows();
  document.getElementById('tableSub').textContent=`${rows.length} pessoa${rows.length!==1?'s':''}`;
  if(!activeSegKeys.size){document.getElementById('tableTitle').textContent='Todos os passageiros';}
  else{
    const filtered=getSegFiltered();
    const comboMap={};
    filtered.forEach(p=>{const key=getComboKey(p.servicos||[]);if(!comboMap[key])comboMap[key]=(p.servicos||[]).slice().sort();});
    document.getElementById('tableTitle').textContent=[...activeSegKeys].map(k=>(comboMap[k]||[]).map(s=>SVC_LABELS[s]||s).join(' + ')||'Sem serviço').join(' · ');
  }
  if(!rows.length){document.getElementById('tableContainer').innerHTML=`<div class="empty-table">Nenhum passageiro encontrado</div>`;return;}
  document.getElementById('tableContainer').innerHTML=`<div style="overflow-x:auto;"><table class="data-table">
    <thead><tr>
      <th>Nome</th><th>Casamento</th><th>Data casamento</th>
      <th>Chegada</th><th>Saída</th><th>Hotel</th><th>Cidade</th>
      <th>Serviços</th><th>Etapa</th><th>E-mail</th>
      <th>Celular</th><th>Telefone</th><th>CPF</th><th>Vendas</th>
    </tr></thead>
    <tbody>${rows.map(r=>`<tr>
      <td class="td-name">${r.nome}</td>
      <td>${r.casamento}</td>
      <td>${fmt(r.dataCasamento)}</td>
      <td>${fmt(r.chegada)}</td>
      <td>${fmt(r.saida)}</td>
      <td>${r.hotel}</td>
      <td>${r.cidade}</td>
      <td>${r.servicos}</td>
      <td>${r.etapa}</td>
      <td>${r.email?`<a href="mailto:${r.email}" style="color:var(--blue);text-decoration:none;">${r.email}</a>`:''}</td>
      <td>${r.celular}</td>
      <td>${r.telefone}</td>
      <td class="td-mono">${r.cpf}</td>
      <td class="td-mono">${r.vendas}</td>
    </tr>`).join('')}</tbody>
  </table></div>`;
}

function exportCSV(){
  const rows=getTableRows();
  if(!rows.length){alert('Nenhum passageiro para exportar.');return;}
  const headers=['Nome','Casamento','Data Casamento','Chegada','Saída','Hotel','Cidade','Serviços','Etapa','Email','Celular','Telefone','CPF','Vendas'];
  const lines=[headers.join(','),...rows.map(r=>[r.nome,r.casamento,r.dataCasamento,r.chegada,r.saida,r.hotel,r.cidade,r.servicos,r.etapa,r.email,r.celular,r.telefone,r.cpf,r.vendas].map(v=>`"${String(v||'').replace(/"/g,'""')}"`).join(','))];
  const blob=new Blob(['\uFEFF'+lines.join('\n')],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`ww_segmentacao_${new Date().toISOString().slice(0,10)}.csv`;a.click();
}
function exportXLSX(){
  const rows=getTableRows();
  if(!rows.length){alert('Nenhum passageiro para exportar.');return;}
  const wsData=[['Nome','Casamento','Data Casamento','Chegada','Saída','Hotel','Cidade','Serviços','Etapa','Email','Celular','Telefone','CPF','Vendas'],
    ...rows.map(r=>[r.nome,r.casamento,r.dataCasamento,r.chegada,r.saida,r.hotel,r.cidade,r.servicos,r.etapa,r.email,r.celular,r.telefone,r.cpf,r.vendas])];
  const wb=XLSX.utils.book_new();
  const ws=XLSX.utils.aoa_to_sheet(wsData);
  ws['!cols']=[{wch:28},{wch:20},{wch:13},{wch:11},{wch:11},{wch:28},{wch:22},{wch:26},{wch:15},{wch:30},{wch:16},{wch:14},{wch:16},{wch:16}];
  XLSX.utils.book_append_sheet(wb,ws,'Segmentação');
  XLSX.writeFile(wb,`ww_segmentacao_${new Date().toISOString().slice(0,10)}.xlsx`);
}

// ── PANEL ─────────────────────────────────────────────────────────────────────
function openPanel(id){activePanelId=id;activeTab='info';document.getElementById('panelOverlay').classList.add('open');document.getElementById('sidePanel').classList.add('open');document.getElementById('boardWrap')?.classList.add('panel-open');renderPanel();render();}
function openAddPanel(colId){
  const tmpId='new_'+Date.now();
  persons.push({id:tmpId,col:colId,nome:'',casamento:WEDDINGS[0]?.nome||'',chegada:'',saida:'',abrioAereo:'',dataCasamento:'',servicos:[],vendas:[],hotel:'',cidade:'',telefone:'',celular:'',email:'',cpf:'',obs:'',notas:[],historico:[],isNew:true});
  openPanel(tmpId);
}
function closePanel(){persons=persons.filter(p=>!p.isNew);activePanelId=null;document.getElementById('panelOverlay').classList.remove('open');document.getElementById('sidePanel').classList.remove('open');document.getElementById('boardWrap')?.classList.remove('panel-open');render();}
function switchTab(tab){activeTab=tab;['info','notas','hist'].forEach(t=>{document.getElementById('tab-'+t).className='panel-tab'+(t===tab?' active':'');});renderPanelBody();}

function renderPanel(){
  const p=persons.find(x=>x.id===activePanelId);if(!p)return;
  const c=wc(p.casamento);
  document.getElementById('panelHeader').innerHTML=`
    <div style="width:36px;height:36px;border-radius:50%;background:${c.l};color:${c.t};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;">${ini(p.nome||'?')}</div>
    <div class="panel-header-info">
      <div class="panel-name">${p.nome||'Novo passageiro'}</div>
      <div class="panel-sub">${p.casamento} · ${fmt(p.dataCasamento)}</div>
    </div>
    <button class="panel-close" onclick="closePanel()"><i class="ti ti-x"></i></button>`;
  document.getElementById('panelFooter').innerHTML=`
    <button class="panel-del-btn" onclick="delPerson('${p.id}')"><i class="ti ti-trash" style="font-size:12px;margin-right:3px;"></i>Remover</button>
    <button class="panel-save-btn" onclick="savePanel('${p.id}')">Salvar</button>`;
  renderPanelBody();
}

function renderPanelBody(){
  const p=persons.find(x=>x.id===activePanelId);if(!p)return;
  const body=document.getElementById('panelBody');
  if(activeTab==='info') body.innerHTML=renderTabInfo(p);
  else if(activeTab==='notas') body.innerHTML=renderTabNotas(p);
  else body.innerHTML=renderTabHist(p);
}

function renderTabInfo(p){
  const ae=aereoStatus(p);
  const wOpts=WEDDINGS.map(w=>`<option value="${w.nome}"${w.nome===p.casamento?' selected':''}>${w.nome}</option>`).join('');
  const colPills=cols.map(col=>`<span class="col-pill${p.col===col.id?' active':''}" onclick="changeCol('${p.id}','${col.id}')">${col.label}</span>`).join('');
  const svcItems=['hospedagem','aereo','seguro','transfer'].map(s=>{
    const has=(p.servicos||[]).includes(s);
    return`<label class="svc-check${has?' '+SVC_CHK_CLS[s]:''}" id="svcl-${s}"><input type="checkbox" ${has?'checked':''} onchange="toggleSvcPerson('${p.id}','${s}')">${SVC_LABELS[s]||s}</label>`;
  }).join('');
  const aereoBox=p.abrioAereo?`<div class="aereo-box"><i class="ti ti-plane"></i><span>Aéreo abre em <strong>${fmt(p.abrioAereo)}</strong>${ae&&ae.cls?` <span class="${ae.cls}" style="margin-left:4px;">${ae.label}</span>`:''}</span></div>`:'';
  const finBtn=isFinalizable(p)&&p.col!=='finalizado'?`<button class="finalize-btn" onclick="quickFinalize('${p.id}')"><i class="ti ti-circle-check"></i> Mover para Finalizado</button>`:'';
  const vendas=(p.vendas||[]);
  return`
    <div class="panel-section"><div class="panel-section-title">Etapa</div><div class="col-selector">${colPills}</div></div>
    <div class="panel-section">
      <div class="panel-section-title">Dados pessoais</div>
      <div class="info-grid">
        <div class="info-field full"><span class="info-label">Nome</span><input class="info-value editable" id="pf-nome" value="${p.nome}"></div>
        <div class="info-field full"><span class="info-label">Casamento</span><select class="info-value editable" id="pf-wedding">${wOpts}</select></div>
        <div class="info-field"><span class="info-label">Chegada</span><input class="info-value editable" type="date" id="pf-chegada" value="${p.chegada||''}"></div>
        <div class="info-field"><span class="info-label">Saída</span><input class="info-value editable" type="date" id="pf-saida" value="${p.saida||''}"></div>
        <div class="info-field full"><span class="info-label">Hotel</span><input class="info-value editable" id="pf-hotel" value="${p.hotel||''}" placeholder="—"></div>
        <div class="info-field full"><span class="info-label">Cidade</span><input class="info-value editable" id="pf-cidade" value="${p.cidade||''}" placeholder="—"></div>
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-section-title">Contato</div>
      <div class="info-grid">
        <div class="info-field"><span class="info-label">Celular</span><input class="info-value editable" id="pf-cel" value="${p.celular||''}"></div>
        <div class="info-field"><span class="info-label">Telefone</span><input class="info-value editable" id="pf-tel" value="${p.telefone||''}"></div>
        <div class="info-field full"><span class="info-label">E-mail</span><input class="info-value editable" id="pf-email" value="${p.email||''}"></div>
        <div class="info-field full"><span class="info-label">CPF</span><input class="info-value editable" id="pf-cpf" value="${p.cpf||''}"></div>
      </div>
    </div>
    <div class="panel-section"><div class="panel-section-title">Serviços</div><div class="svc-checks">${svcItems}</div></div>
    ${vendas.length?`<div class="panel-section"><div class="panel-section-title">Vendas</div><div class="venda-chips">${vendas.map(v=>`<span class="venda-chip">#${v}</span>`).join('')}</div></div>`:''}
    ${aereoBox?`<div class="panel-section">${aereoBox}</div>`:''}
    ${finBtn?`<div class="panel-section">${finBtn}</div>`:''}`;
}

function renderTabNotas(p){
  const notas=(p.notas||[]);
  const list=notas.length?notas.map((n,i)=>`<div class="note-item"><div class="note-meta"><span class="note-date">${fmtTs(n.ts)}</span><button class="note-delete" onclick="deleteNote('${p.id}',${i})"><i class="ti ti-trash"></i></button></div><div class="note-text">${n.text.replace(/</g,'&lt;')}</div></div>`).join(''):`<div class="empty-state"><i class="ti ti-note-off"></i><span>Nenhuma nota ainda</span></div>`;
  return`<div class="notes-area"><div style="display:flex;flex-direction:column;gap:6px;"><textarea class="note-textarea" id="noteInput" placeholder="Adicionar uma nota..."></textarea><button class="note-add-btn" onclick="addNote('${p.id}')">Adicionar</button></div><div class="notes-list">${list}</div></div>`;
}
function renderTabHist(p){
  const hist=(p.historico||[]);
  const ICONS={Movido:'ti-arrows-exchange',Serviço:'ti-shopping-cart',Nota:'ti-note',Dados:'ti-edit'};
  if(!hist.length)return`<div class="history-list"><div class="empty-state"><i class="ti ti-history"></i><span>Sem histórico ainda</span></div></div>`;
  return`<div class="history-list">${hist.map(h=>{const ik=Object.keys(ICONS).find(k=>h.action.startsWith(k))||'Dados';return`<div class="history-item"><div class="history-dot"><i class="ti ${ICONS[ik]}" style="font-size:9px;color:var(--text-dim);"></i></div><div class="history-content"><div class="history-action">${h.action}</div><div class="history-time">${fmtTs(h.ts)}</div></div></div>`;}).join('')}</div>`;
}

function changeCol(id,cid){const p=persons.find(x=>x.id===id);if(!p)return;const oL=cols.find(c=>c.id===p.col)?.label||p.col;const nL=cols.find(c=>c.id===cid)?.label||cid;if(p.col!==cid)addHistory(p,`Movido de "${oL}" para "${nL}"`);p.col=cid;save();renderPanel();render();}
function toggleSvcPerson(id,svc){const p=persons.find(x=>x.id===id);if(!p)return;if(!p.servicos)p.servicos=[];const had=p.servicos.includes(svc);if(had)p.servicos=p.servicos.filter(s=>s!==svc);else p.servicos.push(svc);addHistory(p,`Serviço "${svc}" ${had?'removido':'adicionado'}`);const lbl=document.getElementById(`svcl-${svc}`);if(lbl)lbl.className='svc-check'+(!had?' '+SVC_CHK_CLS[svc]:'');if(isFinalizable(p)&&p.col!=='finalizado'&&p.col!=='oportunidade_futura'){p.col='finalizado';addHistory(p,'Movido para "Finalizado" automaticamente');}save();renderPanel();render();}
function addNote(id){const p=persons.find(x=>x.id===id);if(!p)return;const input=document.getElementById('noteInput');const text=input.value.trim();if(!text)return;if(!p.notas)p.notas=[];p.notas.unshift({ts:Date.now(),text});addHistory(p,'Nota adicionada');input.value='';save();renderPanelBody();}
function deleteNote(id,idx){const p=persons.find(x=>x.id===id);if(!p)return;p.notas.splice(idx,1);addHistory(p,'Nota removida');save();renderPanelBody();}
function savePanel(id){
  const p=persons.find(x=>x.id===id);if(!p)return;
  const oldNome=p.nome;
  p.nome=(document.getElementById('pf-nome')?.value||'').trim();
  p.casamento=document.getElementById('pf-wedding')?.value||p.casamento;
  p.chegada=document.getElementById('pf-chegada')?.value||'';
  p.saida=document.getElementById('pf-saida')?.value||'';
  p.hotel=document.getElementById('pf-hotel')?.value||'';
  p.cidade=document.getElementById('pf-cidade')?.value||'';
  p.celular=document.getElementById('pf-cel')?.value||'';
  p.telefone=document.getElementById('pf-tel')?.value||'';
  p.email=document.getElementById('pf-email')?.value||'';
  p.cpf=document.getElementById('pf-cpf')?.value||'';
  if(!p.nome){alert('Informe o nome.');return;}
  if(oldNome!==p.nome)addHistory(p,`Nome alterado para "${p.nome}"`);
  addHistory(p,'Dados salvos');delete p.isNew;
  save();renderPanel();render();
}
function quickFinalize(id){const p=persons.find(x=>x.id===id);if(!p)return;p.col='finalizado';addHistory(p,'Movido para "Finalizado"');save();if(activePanelId===id)renderPanel();render();}
function delPerson(id){persons=persons.filter(p=>p.id!==id);closePanel();save();render();}
function startEditCol(id){editingCol=id;render();}
function commitCol(id){const el=document.getElementById('ci-'+id);if(el){const v=el.value.trim();if(v){const c=cols.find(x=>x.id===id);if(c)c.label=v;}}editingCol=null;save();render();}
function toggleMassMode(){massMode=!massMode;if(!massMode)selected.clear();render();}
function cancelMassMode(){massMode=false;selected.clear();render();}
function executeMassMove(){const target=document.getElementById('massTarget').value;if(!target||!selected.size)return;persons.forEach(p=>{if(selected.has(p.id)){const oL=cols.find(c=>c.id===p.col)?.label||p.col;const nL=cols.find(c=>c.id===target)?.label||target;addHistory(p,`Movido de "${oL}" para "${nL}"`);p.col=target;}});selected.clear();save();render();}
function cardClick(e,id){if(massMode){e.stopPropagation();if(selected.has(id))selected.delete(id);else selected.add(id);render();}else openPanel(id);}

document.addEventListener('DOMContentLoaded',()=>{
  load();
  populateSelects();
  document.getElementById('search').addEventListener('input',e=>{searchT=e.target.value;render();});
  document.addEventListener('click',e=>{
    if(document.getElementById('weddingWrap')&&!document.getElementById('weddingWrap').contains(e.target))
      document.getElementById('weddingDropdown').classList.remove('open');
  });
  render();
});

</script>
</body>
